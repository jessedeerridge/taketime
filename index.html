function getPlusMinusSignForMission(mission, room){

function normalizeOrderLabel(value){
  return String(value ?? '')
    .replace(/[０-９]/g, (ch) => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0))
    .trim();
}

function parseOrderNumber(value){
  const n = Number(normalizeOrderLabel(value));
  return Number.isFinite(n) ? n : null;
}

function getSeatedPlayerIds(){
  return Object.values(state.tables || {})
    .filter((seat) => seat?.playerId)
    .map((seat) => seat.playerId);
}

function getGlobalPlacementProgress(){
  const seatedPlayerIds = getSeatedPlayerIds();
  if (!seatedPlayerIds.length) return null;

  const remainingCards = seatedPlayerIds.reduce((sum, pid) => {
    const cards = state.hands?.[pid]?.cards;
    return sum + (Array.isArray(cards) ? cards.length : 0);
  }, 0);
  const placedCount = Object.values(state.playedCards || {})
    .filter((card) => card?.playerId && seatedPlayerIds.includes(card.playerId))
    .length;
  const totalExpectedCards = remainingCards + placedCount;
  if (!totalExpectedCards) return null;
  return {
    nextIndex: placedCount + 1,
    totalExpectedCards
  };
}

function getForcedClockRoomsForNextPlacement(stage = currentStage){
  const progress = getGlobalPlacementProgress();
  if (!progress) return new Set();

  const forcedRooms = new Set();
  const { nextIndex, totalExpectedCards } = progress;

  const clockLabels = getClockLabelsForMission(stage) || {};
  Object.entries(clockLabels).forEach(([roomKey, label]) => {
    const order = parseOrderNumber(label);
    if (order !== null && order === nextIndex){
      forcedRooms.add(Number(roomKey));
    }
  });

  const doubleclock = getDoubleclockSpec(stage);
  if (doubleclock && Number(doubleclock.room) >= 1){
    const leftOrder = parseOrderNumber(doubleclock.left);
    const rightOrder = parseOrderNumber(doubleclock.right);
    if (leftOrder === nextIndex || rightOrder === nextIndex){
      forcedRooms.add(Number(doubleclock.room));
    }
  }

  const blackClockRooms = STAGE_BLACKCLOCK_ROOMS[stage] || [];
  if (nextIndex === totalExpectedCards){
    blackClockRooms.forEach((room) => forcedRooms.add(Number(room)));
  }

  return forcedRooms;
}

function renderStageMarks(mission){
  while(stageMarksG.firstChild) stageMarksG.removeChild(stageMarksG.firstChild);

  const specified = new Set(getSpecifiedRoomsForMission(mission));
  const isNavy = isNavyStage(mission);
  const cs4 = getComputedStyle(stageSvg);
  const rBase  = innerR;
  const len    = parseFloat(cs4.getPropertyValue('--markLen')) || 12;
  const spread = parseFloat(cs4.getPropertyValue('--markSpreadDeg')) || 18;

  const stroke = cs4.getPropertyValue('--markStroke').trim() || '#facc15';
  const sw     = parseFloat(cs4.getPropertyValue('--markStrokeW')) || 2;
  const alpha  = parseFloat(cs4.getPropertyValue('--markAlpha')) || 1;

  const diaFill   = cs4.getPropertyValue('--diamondFill').trim()   || '#facc15';
  const diaStroke = cs4.getPropertyValue('--diamondStroke').trim() || 'none';
  const diaSW     = parseFloat(cs4.getPropertyValue('--diamondStrokeW')) || 0;
  const diaW      = Math.abs(parseFloat(cs4.getPropertyValue('--diamondW')) || 2.5);
  const diaTop    = Math.abs(parseFloat(cs4.getPropertyValue('--diamondTop')) || 4);
  const diaBot    = Math.abs(parseFloat(cs4.getPropertyValue('--diamondBot')) || 2);
  const diaPos    = Math.min(0.95, Math.max(0.05, parseFloat(cs4.getPropertyValue('--diamondPos')) || 0.55));

  const centerLineColor = cs4.getPropertyValue('--centerLineColor').trim() || stroke;
  const centerLineW     = parseFloat(cs4.getPropertyValue('--centerLineW')) || sw;
  const centerLineGap   = Math.max(0, parseFloat(cs4.getPropertyValue('--centerLineGap')) || 0);

  const defs = stageSvg.querySelector('defs');

  for(let room=1; room<=6; room++){
    if(specified.has(room)) continue;

    const midDeg = (room-1)*60 + 30;
    const a0 = midDeg - spread/2;
    const a1 = midDeg + spread/2;

    const p0  = polar(rBase, a0);
    const p1  = polar(rBase, a1);
    const tip = polar(rBase - len, midDeg);

    const dFill = `M ${p0.x},${p0.y} L ${tip.x},${tip.y} L ${p1.x},${p1.y} Z`;
    const clipId = `markClip-${room}`;
    const oldClip = stageSvg.querySelector(`#${clipId}`);
    if (oldClip) oldClip.remove();

    const cp = document.createElementNS('http://www.w3.org/2000/svg','clipPath');
    cp.setAttribute('id', clipId);
    const pathFill = document.createElementNS('http://www.w3.org/2000/svg','path');
    pathFill.setAttribute('d', dFill);
    cp.appendChild(pathFill);
    defs.appendChild(cp);

    if (isNavy){
      const triFill = document.createElementNS('http://www.w3.org/2000/svg','path');
      triFill.setAttribute('d', dFill);
      triFill.setAttribute('fill', cs4.getPropertyValue('--light').trim() || '#e6e3e3');
      stageMarksG.appendChild(triFill);
    } else {
      const imgSize = Math.ceil(2 * rBase);
      const img = document.createElementNS('http://www.w3.org/2000/svg','image');
      img.setAttributeNS('http://www.w3.org/1999/xlink','href','star.jpg');
      img.setAttribute('x', -imgSize/2);
      img.setAttribute('y', -imgSize/2);
      img.setAttribute('width',  imgSize);
      img.setAttribute('height', imgSize);
      img.setAttribute('preserveAspectRatio','xMidYMid slice');
      img.setAttribute('clip-path', `url(#${clipId})`);
      stageMarksG.appendChild(img);
    }

    const rCenter = rBase - len * diaPos;
    const deltaDeg = (diaW / Math.max(1, rCenter)) * 180/Math.PI;
    const ptTop    = polar(rCenter - diaTop,  midDeg);
    const ptBottom = polar(rCenter + diaBot,  midDeg);
    const ptLeft   = polar(rCenter,           midDeg - deltaDeg);
    const ptRight  = polar(rCenter,           midDeg + deltaDeg);

    const dDiamond = `M ${ptLeft.x},${ptLeft.y} L ${ptTop.x},${ptTop.y} L ${ptRight.x},${ptRight.y} L ${ptBottom.x},${ptBottom.y} Z`;
    const diamond = document.createElementNS('http://www.w3.org/2000/svg','path');
    diamond.setAttribute('d', dDiamond);
    diamond.setAttribute('fill', diaFill);
    diamond.setAttribute('stroke', diaStroke);
    diamond.setAttribute('stroke-width', diaSW);
    stageMarksG.appendChild(diamond);

    const dLines = `M ${p0.x},${p0.y} L ${tip.x},${tip.y} M ${tip.x},${tip.y} L ${p1.x},${p1.y}`;
    const pathStroke = document.createElementNS('http://www.w3.org/2000/svg','path');
    pathStroke.setAttribute('d', dLines);
    pathStroke.setAttribute('fill', 'none');
    pathStroke.setAttribute('stroke', stroke);
    pathStroke.setAttribute('stroke-width', sw);
    pathStroke.setAttribute('stroke-opacity', alpha);
    pathStroke.setAttribute('stroke-linecap', 'butt');
    pathStroke.setAttribute('stroke-linejoin', 'miter');
    pathStroke.setAttribute('data-room', String(room));
    stageMarksG.appendChild(pathStroke);

    const startR = Math.max(innerR - centerLineGap, 0);
    const endR   = rCenter;
    const pStart = polar(startR, midDeg);
    const pEnd   = polar(endR,   midDeg);
    const centerLine = document.createElementNS('http://www.w3.org/2000/svg','path');
    centerLine.setAttribute('d', `M ${pStart.x},${pStart.y} L ${pEnd.x},${pEnd.y}`);
    centerLine.setAttribute('fill', 'none');
    centerLine.setAttribute('stroke', centerLineColor);
    centerLine.setAttribute('stroke-width', centerLineW);
    centerLine.setAttribute('stroke-linecap', 'butt');
    centerLine.setAttribute('stroke-linejoin', 'miter');
    stageMarksG.appendChild(centerLine);
  }
}

function renderClockMarks(mission){
  if(!stageClockG) return;
  while(stageClockG.firstChild) stageClockG.removeChild(stageClockG.firstChild);

  const labels = getClockLabelsForMission(mission);
  if(!labels) return;

  const csClock = getComputedStyle(stageSvg);
  const scale = parseFloat(csClock.getPropertyValue('--clockMarkScale')) || 1;
  const roomFs = parseFloat(csClock.getPropertyValue('--roomTextSize')) || 12;
  const roomBgRVar = parseFloat(csClock.getPropertyValue('--roomTextBgR'));
  const roomBgR = Number.isNaN(roomBgRVar) ? (roomFs * 0.95) : roomBgRVar;
  const ringR = Math.max(4, roomBgR * scale);
  const size = ringR * 2;
  const tickOuter = ringR * 0.98;
  const tickInner = ringR * 0.84;

  const fill = csClock.getPropertyValue('--clockMarkFill').trim() || '#ffd8a8';
  const clockroomStyle = getClockroomSharedStyle();
  const stroke = clockroomStyle.stroke;
  const strokeW = Math.max(0.6, (parseFloat(csClock.getPropertyValue('--clockMarkStrokeW')) || 2.8) * scale);
  const textColor = csClock.getPropertyValue('--clockMarkTextColor').trim() || '#2b2b2b';
  const deltaR = parseFloat(csClock.getPropertyValue('--clockMarkDeltaR')) || 0;
  const textScale = parseFloat(csClock.getPropertyValue('--clockMarkTextScale')) || 1;

  Object.entries(labels).forEach(([roomStr, text])=>{
    const room = Number(roomStr);
    if(!(room >= 1 && room <= 6)) return;

    const midDeg = (room - 1) * 60 + 30;
    const pos = polar((innerR + outerR) / 2 + 4 + deltaR, midDeg);

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('transform', `translate(${pos.x},${pos.y})`);

    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', '0');
    c.setAttribute('cy', '0');
    c.setAttribute('r', ringR.toFixed(2));
    c.setAttribute('fill', fill);
    c.setAttribute('stroke', stroke);
    c.setAttribute('stroke-width', strokeW.toFixed(2));
    g.appendChild(c);

    for(let i=0;i<12;i++){
      const a = (i * 30) * Math.PI / 180;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', (tickInner * Math.cos(a)).toFixed(2));
      line.setAttribute('y1', (tickInner * Math.sin(a)).toFixed(2));
      line.setAttribute('x2', (tickOuter * Math.cos(a)).toFixed(2));
      line.setAttribute('y2', (tickOuter * Math.sin(a)).toFixed(2));
      line.setAttribute('stroke', stroke);
      line.setAttribute('stroke-width', Math.max(0.5, strokeW * 0.8).toFixed(2));
      line.setAttribute('stroke-linecap', 'round');
      g.appendChild(line);
    }

    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.textContent = text;
    t.setAttribute('x', '0');
    t.setAttribute('y', '0.8');
    t.setAttribute('transform', `rotate(${midDeg})`);
    t.setAttribute('fill', textColor);
    t.setAttribute('font-size', String(Math.max(4, size * 0.34 * textScale) + 2));
    t.setAttribute('font-weight', '900');
    t.setAttribute('font-family', 'Arial, "Hiragino Sans", "Yu Gothic", sans-serif');
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('dominant-baseline', 'middle');
    g.appendChild(t);

    stageClockG.appendChild(g);
  });
}

function quadPoint(p0, c, p1, t){
  const u=1-t;
  return { x:u*u*p0.x + 2*u*t*c.x + t*t*p1.x, y:u*u*p0.y + 2*u*t*c.y + t*t*p1.y };
}
function quadTangent(p0, c, p1, t){
  return { x:2*(1-t)*(c.x-p0.x)+2*t*(p1.x-c.x), y:2*(1-t)*(c.y-p0.y)+2*t*(p1.y-c.y) };
}
function taperedQuadRibbonPath(p0, c, p1, w0, w1, steps = 12){
  const left = [], right = [];
  function easeHalf(t){ return Math.min(t * 1.3, 1); }
  for(let i=0; i<=steps; i++){
    const t  = i / steps;
    const te = easeHalf(t);
    const p  = quadPoint(p0, c, p1, t);
    const tg = quadTangent(p0, c, p1, t);
    const L  = Math.hypot(tg.x, tg.y) || 1;
    const nx = -tg.y / L, ny = tg.x / L;
    const w  = (w0 + (w1 - w0) * te);
    left.push({ x: p.x + nx * (w/2), y: p.y + ny * (w/2) });
  }
  for(let i=steps; i>=0; i--){
    const t  = i / steps;
    const te = easeHalf(t);
    const p  = quadPoint(p0, c, p1, t);
    const tg = quadTangent(p0, c, p1, t);
    const L  = Math.hypot(tg.x, tg.y) || 1;
    const nx = -tg.y / L, ny = tg.x / L;
    const w  = (w0 + (w1 - w0) * te);
    right.push({ x: p.x - nx * (w/2), y: p.y - ny * (w/2) });
  }
  const pts = [...left, ...right];
  return 'M ' + pts.map(p => `${p.x},${p.y}`).join(' L ') + ' Z';
}

const stageOutG = stageSvg.querySelector('#stageOutward');

function appendGoldX(parentG, triClipId, midDeg, len, rBase, spread, strokeColor = '#facc15'){
  const cs5  = getComputedStyle(stageSvg);
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('clip-path', `url(#${triClipId})`);

  const kCSS  = parseFloat(cs5.getPropertyValue('--goldXScale')) || 0.56;
  const chord = 2 * (rBase + len*0.58) * Math.sin((spread * Math.PI/180)/2);
  const unitS = Math.min(len * 0.98, chord * 0.86) * kCSS;
  const s     = unitS / 20;

  const pos = polar(rBase + len * 0.56, midDeg);
  const tr = `translate(${pos.x},${pos.y}) rotate(${midDeg}) scale(${s}) translate(${-10},${-12})`;

  function mk(dStr){
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', dStr);
    p.setAttribute('fill', 'none');
    p.setAttribute('stroke', strokeColor);
    const baseW = parseFloat(cs5.getPropertyValue('--goldXStrokeW')) || 0.40;
    p.setAttribute('stroke-width', baseW);
    p.setAttribute('stroke-linecap','round');
    p.setAttribute('stroke-linejoin','round');
    p.setAttribute('transform', tr);
    return p;
  }

  [
    "M12 20 L8.951 16.515 Q5 12 8.180 6.912 L10 4",
    "M14 20 L10.951 16.515 Q7 12 10.087 6.855 L10 7",
    "M6  20 L9.049 16.515 Q13 12 9.913 6.855 L10 7",
    "M8  20 L11.049 16.515 Q15 12 11.820 6.912 L10 4"
  ].forEach(d => g.appendChild(mk(d)));

  parentG.appendChild(g);
}

function renderOutwardMarks(mission){
  while(stageOutG.firstChild) stageOutG.removeChild(stageOutG.firstChild);

  const specified = new Set(getSpecifiedRoomsForMission(mission));
  const isNavy = isNavyStage(mission);
  const stageOutwardFilledRooms = isNavy ? new Set(specified) : new Set();

  const cs6 = getComputedStyle(stageSvg);
  const rBase    = innerR + (parseFloat(cs6.getPropertyValue('--outTriInset')) || 0);
  const len      = Math.abs(parseFloat(cs6.getPropertyValue('--outTriLen')) || 16);
  const spread   = Math.abs(parseFloat(cs6.getPropertyValue('--outTriSpreadDeg')) || 22);

  const color   = cs6.getPropertyValue('--outTriStroke').trim() || '#111';
  const opacity = parseFloat(cs6.getPropertyValue('--outTriOpacity')) || 1;
  const specifiedFill = cs6.getPropertyValue('--orange').trim() || '#ab5d1a';

  const kCurve  = Math.max(0, Math.min(1, parseFloat(cs6.getPropertyValue('--outTriCurveK')) || 0));
  const baseW = Math.abs(parseFloat(cs6.getPropertyValue('--outTriBaseW')) || 2.6);
  const tipW  = Math.abs(parseFloat(cs6.getPropertyValue('--outTriTipW'))  || 0.6);

  const defs = stageSvg.querySelector('defs');

  for(let room=1; room<=6; room++){
    const midDeg = (room-1)*60 + 30;
    const aL = midDeg - spread/2;
    const aR = midDeg + spread/2;

    const pL  = polar(rBase, aL);
    const pR  = polar(rBase, aR);
    const tip = polar(rBase + len, midDeg);

    const cL = (()=>{ const midDegL = (aL + midDeg)/2;
      const r = (rBase + (rBase+len))/2 + len * kCurve * 0.6; return polar(r, midDegL); })();
    const cR = (()=>{ const midDegR = (aR + midDeg)/2;
      const r = (rBase + (rBase+len))/2 + len * kCurve * 0.6; return polar(r, midDegR); })();

    const dTriArea = [
      `M ${pL.x},${pL.y}`,
      `Q ${cL.x},${cL.y} ${tip.x},${tip.y}`,
      `Q ${cR.x},${cR.y} ${pR.x},${pR.y}`,
      `A ${innerR},${innerR} 0 0 1 ${pL.x},${pL.y}`,
      'Z'
    ].join(' ');

    const clipId = `outTriClip-${room}`;
    const oldClip = stageSvg.querySelector(`#${clipId}`);
    if (oldClip) oldClip.remove();

    const cp = document.createElementNS('http://www.w3.org/2000/svg','clipPath');
    cp.setAttribute('id', clipId);
    const triPath = document.createElementNS('http://www.w3.org/2000/svg','path');
    triPath.setAttribute('d', dTriArea);
    cp.appendChild(triPath);
    defs.appendChild(cp);

    if (stageOutwardFilledRooms.has(room)){
      if (isNavy){
        const specifiedTri = document.createElementNS('http://www.w3.org/2000/svg','path');
        specifiedTri.setAttribute('d', dTriArea);
        specifiedTri.setAttribute('fill', specifiedFill);
        specifiedTri.setAttribute('fill-opacity', String(opacity));
        stageOutG.appendChild(specifiedTri);
      }
      continue;
    }

    const whiteOnlyRoom = isWhiteOnlyRoom(mission, room);
    const specifiedRoom = specified.has(room);
    const specifiedRoomWhite = '#e0ffff';
    const outwardLineFill = specifiedRoom
      ? specifiedRoomWhite
      : (whiteOnlyRoom ? '#ffffff' : color);

    const dLeftRibbon  = taperedQuadRibbonPath(pL, cL, tip, baseW, tipW, 12);
    const dRightRibbon = taperedQuadRibbonPath(pR, cR, tip, baseW, tipW, 12);

    const leftRibbon = document.createElementNS('http://www.w3.org/2000/svg','path');
    leftRibbon.setAttribute('d', dLeftRibbon);
    leftRibbon.setAttribute('fill', outwardLineFill);
    leftRibbon.setAttribute('fill-opacity', opacity);
    stageOutG.appendChild(leftRibbon);

    const rightRibbon = document.createElementNS('http://www.w3.org/2000/svg','path');
    rightRibbon.setAttribute('d', dRightRibbon);
    rightRibbon.setAttribute('fill', outwardLineFill);
    rightRibbon.setAttribute('fill-opacity', opacity);
    stageOutG.appendChild(rightRibbon);

    if (isNavy){
      const imgSize = Math.ceil(2 * (rBase + len));
      const img = document.createElementNS('http://www.w3.org/2000/svg','image');
      img.setAttributeNS('http://www.w3.org/1999/xlink','href','star.jpg');
      img.setAttribute('x', -imgSize/2);
      img.setAttribute('y', -imgSize/2);
      img.setAttribute('width',  imgSize);
      img.setAttribute('height', imgSize);
      img.setAttribute('preserveAspectRatio', 'xMidYMid slice');
      img.setAttribute('clip-path', `url(#${clipId})`);
      stageOutG.appendChild(img);
    }

    const goldXStroke = specifiedRoom
      ? specifiedRoomWhite
      : (whiteOnlyRoom ? '#ffffff' : '#facc15');
    appendGoldX(stageOutG, clipId, midDeg, len, rBase, spread, goldXStroke);

    if (isNavy && !whiteOnlyRoom){
      [leftRibbon, rightRibbon].forEach((el)=>{
        el.setAttribute('fill', '#000');
        el.setAttribute('stroke', '#fff');
        el.setAttribute('stroke-width', '0.5');
        el.setAttribute('stroke-linejoin', 'round');
      });
    }
  }
}

function makeBowlPaths({dip=9, halfW=8, extra=4}={}) {
  const R0 = 45, Cx = 50, Cy = 5;
  const R  = R0 + extra;
  const xL = 5  - extra, yL = 5;
  const xR = 95 + extra, yR = 5;

  const yJoin = Cy + Math.sqrt(R0*R0 - halfW*halfW);
  const xLJ   = Cx - halfW;
  const xRJ   = Cx + halfW;

  const xDeep = Cx;
  const yDeep = Cy + R0 + dip;

  const rS = Math.max(2, Math.min(20, 0.9*halfW + 0.6*dip));

  const cs7 = getComputedStyle(stageSvg);
  const L = xR - xL;
  const halfChord = L / 2;

  const capDeg = parseFloat(cs7.getPropertyValue('--bowl-cap-deg'));
  const capSag = parseFloat(cs7.getPropertyValue('--bowl-cap-sag'));
  let   Rcap   = parseFloat(cs7.getPropertyValue('--bowl-cap-R')) || 90;

  if (!Number.isNaN(capDeg)) {
    const th = Math.max(1, Math.min(359, capDeg)) * Math.PI/180;
    Rcap = L / (2 * Math.sin(th/2));
  } else if (!Number.isNaN(capSag)) {
    const h = Math.max(0.5, capSag);
    Rcap = (L*L) / (8*h) + h/2;
  }
  Rcap = Math.max(halfChord + 1e-3, Rcap);

  let largeArcFlag = 0;
  if (!Number.isNaN(capDeg) && capDeg > 180) largeArcFlag = 1;

  const dFill =
    `M ${xL} ${yL}` +
    ` A ${R} ${R} 0 0 0 ${xLJ} ${yJoin}` +
    ` A ${rS} ${rS} 0 0 1 ${xDeep} ${yDeep}` +
    ` A ${rS} ${rS} 0 0 1 ${xRJ} ${yJoin}` +
    ` A ${R} ${R} 0 0 0 ${xR} ${yR}` +
    ` A ${Rcap} ${Rcap} 0 ${largeArcFlag} 0 ${xL} ${yL}` +
     ` Z`;

  const dStroke =
    `M ${xL} ${yL}` +
    ` A ${R} ${R} 0 0 0 ${xLJ} ${yJoin}` +
    ` A ${rS} ${rS} 0 0 1 ${xDeep} ${yDeep}` +
    ` A ${rS} ${rS} 0 0 1 ${xRJ} ${yJoin}` +
    ` A ${R} ${R} 0 0 0 ${xR} ${yR}`;

  return { dStroke, dFill };
}

(function setupBowlSymbol(){
  const cs8 = getComputedStyle(stageSvg);

function renderSpecifiedBowls(mission){
  while(stageSpecifiedG.firstChild) stageSpecifiedG.removeChild(stageSpecifiedG.firstChild);

  const specified = new Set(getSpecifiedRoomsForMission(mission));
  if(specified.size === 0) return;

  const cs9 = getComputedStyle(stageSvg);
  const scale   = parseFloat(cs9.getPropertyValue('--bowl-scale')) || 0.52;
  const gap     = parseFloat(cs9.getPropertyValue('--bowl-gap'))   || 1.8;
  const offsetX = parseFloat(cs9.getPropertyValue('--bowl-offset-x')) || -21;

  const VB_TOP = 5, VB_CX = 50;

  const fillColorDefault = cs9.getPropertyValue('--bowlFillColor').trim() || '#fff';
  const fillColorMission14 = cs9.getPropertyValue('--orange').trim() || '#ab5d1a';
  const fillColor = isNavyStage(mission) ? fillColorMission14 : fillColorDefault;
  const fillOpacity = Math.max(0, Math.min(1, parseFloat(cs9.getPropertyValue('--bowlFillOpacity')) || 1));

  const defs = stageSvg.querySelector('defs');

  specified.forEach(room=>{
    const a0 = (room-1)*60;
    const a1 = a0 + 60;

    const dSector = sectorPath(innerR, outerR, a0, a1);

    const Rtarget = outerR - gap;
    const midDeg  = a0 + 30;
    const pos = polar( Rtarget - (VB_TOP * scale), midDeg );
    const bowlTr = `translate(${pos.x},${pos.y}) rotate(${midDeg}) translate(${(-VB_CX*scale + offsetX)},0) scale(${scale})`;

    const maskId = `bowlMask-room${room}`;
    const oldMask = stageSvg.querySelector(`#${maskId}`);
    if (oldMask) oldMask.remove();

    const mask = document.createElementNS('http://www.w3.org/2000/svg','mask');
    mask.setAttribute('id', maskId);
    mask.setAttribute('maskUnits','userSpaceOnUse');

    const mWhite = document.createElementNS('http://www.w3.org/2000/svg','path');
    mWhite.setAttribute('d', dSector);
    mWhite.setAttribute('fill', '#fff');
    mask.appendChild(mWhite);

    const mBowl = document.createElementNS('http://www.w3.org/2000/svg','use');
    mBowl.setAttributeNS('http://www.w3.org/1999/xlink','href', '#notchedBowl');
    mBowl.setAttribute('transform', bowlTr);
    mBowl.setAttribute('fill', '#000');
    mBowl.setAttribute('stroke', 'none');
    mask.appendChild(mBowl);

    defs.appendChild(mask);

    const sectorFill = document.createElementNS('http://www.w3.org/2000/svg','path');
    sectorFill.setAttribute('d', dSector);
    sectorFill.setAttribute('fill', fillColor);
    sectorFill.setAttribute('fill-opacity', String(fillOpacity));
    sectorFill.setAttribute('mask', `url(#${maskId})`);
    sectorFill.setAttribute('clip-path', 'url(#clipOuterUnion)');
    stageSpecifiedG.appendChild(sectorFill);

    const use = document.createElementNS('http://www.w3.org/2000/svg','use');
    use.setAttributeNS('http://www.w3.org/1999/xlink','href', '#notchedBowl');
    use.setAttribute('transform', bowlTr);
    use.setAttribute('aria-label', `指定部屋ノッチ room ${room}`);
    stageSpecifiedG.appendChild(use);
  });
}

function renderCenterTopDiamond(){
  const g = stageSvg.querySelector('#centerTopDiamondG');

  while(g.firstChild) g.removeChild(g.firstChild);

  const cs12 = getComputedStyle(stageSvg);
  const r1 = parseFloat(cs12.getPropertyValue('--innerR')) || 65;
  const offset = parseFloat(cs12.getPropertyValue('--tipDiaOffset')) || 0;

  const w = Math.abs(parseFloat(cs12.getPropertyValue('--tipDiaW')) || 6);
  const h = Math.abs(parseFloat(cs12.getPropertyValue('--tipDiaH')) || 8);

  const fill   = cs12.getPropertyValue('--tipDiaFill').trim()   || '#facc15';

  const sw     = Math.max(0, parseFloat(cs12.getPropertyValue('--tipDiaStrokeW')) || 0);
  const ringR = Math.max(2, Math.abs(parseFloat(cs12.getPropertyValue('--tipDiaRingR')) || 11));
  const ringW = Math.max(0.6, Math.abs(parseFloat(cs12.getPropertyValue('--tipDiaRingW')) || 1.8));
  const ringStroke = cs12.getPropertyValue('--tipDiaRingStroke').trim() || '#d4af37';
  const ringFill = cs12.getPropertyValue('--tipDiaRingFill').trim() || '#8b5e3c';
  const hitR = Math.max(ringR, Math.abs(parseFloat(cs12.getPropertyValue('--tipDiaHitR')) || (ringR + 6)));

  const cx = 0;
  const cy = -r1 - offset;

  const hit = document.createElementNS('http://www.w3.org/2000/svg','circle');
  hit.setAttribute('class', 'center-needle-handle');
  hit.setAttribute('cx', String(cx));
  hit.setAttribute('cy', String(cy));

  const d = `M ${pLeft.x},${pLeft.y} L ${pTop.x},${pTop.y} L ${pRight.x},${pRight.y} L ${pBottom.x},${pBottom.y} Z`;

  path.setAttribute('stroke-width', sw);

  };
  const room6TanBase = parseFloat(cs13.getPropertyValue('--cardRoom6Tan')) || 0;
  const room4TanBase = parseFloat(cs13.getPropertyValue('--cardRoom4Tan'));
  const room1TanBase = parseFloat(cs13.getPropertyValue('--cardRoom1Tan'));
  const roomTan = {
    1: Number.isNaN(room1TanBase) ? room6TanBase : room1TanBase,

  };
  const localX = parseFloat(cs13.getPropertyValue('--cardLocalX')) || 0;
  const localY = parseFloat(cs13.getPropertyValue('--cardLocalY')) || 0;

  const ruleCardInset = 2;
  const rBase = (outerR + innerR) / 2 + baseOffset - ruleCardInset;  function getFillStrokeFor(room){
    if(room===6) return {fill: fillRoom6, stroke: strokeRoom6};

    return {fill: fillRoom1, stroke: strokeRoom1};
  }

  function appendCardAt(room, extraTan=0, extraRad=0, extraRot=0, paint=null, flipDirection=false){

      `translate(${(roomTan[room]||0) + extraTan}, 0)`,
      `translate(0, ${-(rBase + (roomRad[room]||0) + extraRad)})`,
      `rotate(${cardRot})`,
      `translate(${localX}, ${localY})`
    ].join(' ');

    const defaultPaint = getFillStrokeFor(room);
    const fill = paint?.fill ?? defaultPaint.fill;
    const stroke = paint?.stroke ?? defaultPaint.stroke;

    const cardG = document.createElementNS('http://www.w3.org/2000/svg','g');
    cardG.setAttribute('transform', tr);

    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x', (-cardW/2).toFixed(3));
    rect.setAttribute('y', (-cardH/2).toFixed(3));

    rect.setAttribute('height', cardH);
    rect.setAttribute('rx', cardR);
    rect.setAttribute('ry', cardR);

    rect.setAttribute('stroke', stroke);
    rect.setAttribute('stroke-width', sw);

  function appendClockRoom(room, {
    extraTan = 0,

  } = {}){
    const midDeg = (room-1)*60 + 30;

    const tr = [

    const roomFs = parseFloat(csClock.getPropertyValue('--roomTextSize')) || 12;
    const roomBgRVar = parseFloat(csClock.getPropertyValue('--roomTextBgR'));
    const roomBgR = Number.isNaN(roomBgRVar) ? (roomFs * 0.95) : roomBgRVar;
    const rClock = Math.max(7.5, roomBgR * markScale * Math.max(0.4, sizeScale));
    const size = rClock * 2;
    const tickOuter = rClock * 0.98;
    const tickInner = rClock * 0.84;
    const fill = csClock.getPropertyValue('--clockMarkFill').trim() || '#ffd8a8';
    const clockroomStyle = getClockroomSharedStyle();
    const strokeColor = clockroomStyle.stroke;
    const strokeW = Math.max(0.6, (parseFloat(csClock.getPropertyValue('--clockMarkStrokeW')) || 2.8) * markScale * Math.max(0.4, sizeScale));

    for (let i = 0; i < 12; i++){

      const x1 = (tickInner * Math.cos(a)).toFixed(2);
      const y1 = (tickInner * Math.sin(a)).toFixed(2);
      const x2 = (tickOuter * Math.cos(a)).toFixed(2);

      line.setAttribute('stroke-width', Math.max(0.5, strokeW * 0.8).toFixed(2));
      line.setAttribute('stroke-linecap', 'round');

    }

    const centerRadius = Math.max(2.4, rClock * 0.24 * Math.max(0.4, centerScale));
    if (blackclock){
      const center = document.createElementNS('http://www.w3.org/2000/svg','circle');
      center.setAttribute('cx', '0');

      center.setAttribute('stroke-width', '0.6');
      tokenG.appendChild(center);

      const wedge = document.createElementNS('http://www.w3.org/2000/svg','path');
      const a0 = -120 * Math.PI / 180;
      const a1 = -90 * Math.PI / 180;
      const x0 = centerRadius * Math.cos(a0);
      const y0 = centerRadius * Math.sin(a0);
      const x1 = centerRadius * Math.cos(a1);
      const y1 = centerRadius * Math.sin(a1);
      wedge.setAttribute('d', `M0,0 L${x0.toFixed(2)},${y0.toFixed(2)} A${centerRadius.toFixed(2)},${centerRadius.toFixed(2)} 0 0 1 ${x1.toFixed(2)},${y1.toFixed(2)} Z`);
      wedge.setAttribute('fill', '#d9b38c');
      wedge.setAttribute('opacity', '0.95');
      tokenG.appendChild(wedge);
    }

    if (text){
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.textContent = String(text);
      t.setAttribute('x', '0');
      t.setAttribute('y', '0.8');
      t.setAttribute('transform', `rotate(${-(rotBase + extraRot)})`);
      t.setAttribute('fill', textColor);
      t.setAttribute('font-size', String(Math.max(4, size * 0.34 * textScale) + 2));
      t.setAttribute('font-weight', '900');
      t.setAttribute('font-family', 'Arial, "Hiragino Sans", "Yu Gothic", sans-serif');
      t.setAttribute('text-anchor', 'middle');
      t.setAttribute('dominant-baseline', 'middle');

    g.appendChild(tokenG);

  function appendCenterBrownPair({
    sizeDelta = 0,
    overlap = false,

    centerRightArrow = false,

    const radius = 1.8 + (sizeDelta * 0.16);
    const halfGap = Math.max(2, (overlap ? 4.2 : 8) + halfGapDelta);
    [
      { dx: halfGap, rotateDeg: rightRotateDeg, isLeft: false },
      { dx: -halfGap, rotateDeg: leftRotateDeg, isLeft: true }
    ].forEach(({ dx, rotateDeg, isLeft }) => {

  const specifiedRooms = new Set(getSpecifiedRoomsForMission(mission));

  if (mission==='1-1'){
    if (specifiedRooms.has(1)) appendCardAt(1);
    if (specifiedRooms.has(6)) {
      const fanN   = Math.max(1, Math.round(parseFloat(cs13.getPropertyValue('--room6FanCount')) || 3));
      const spread = parseFloat(cs13.getPropertyValue('--room6FanSpreadDeg')) || 14;
      const stepT  = parseFloat(cs13.getPropertyValue('--room6FanTanStep'))   || 6;
      const stepR  = parseFloat(cs13.getPropertyValue('--room6FanRadStep'))   || -1;
      const indices = [...Array(fanN).keys()].map(i => i - (fanN-1)/2);
      const topSide = parseFloat(cs13.getPropertyValue('--room6FanTopSide')) || 1;
      const drawOrder = (topSide >= 0) ? indices : [...indices].reverse();
      drawOrder.forEach(idx => appendCardAt(6, idx*stepT, idx*stepR, idx*spread, null, true));
    }
  }

  if (mission==='1-2'){
    if (specifiedRooms.has(4)) {
      const fanN   = Math.max(1, Math.round(parseFloat(cs13.getPropertyValue('--room6FanCount')) || 3));
      const spread = parseFloat(cs13.getPropertyValue('--room6FanSpreadDeg')) || 14;
      const stepT  = parseFloat(cs13.getPropertyValue('--room6FanTanStep'))   || 6;
      const stepR  = parseFloat(cs13.getPropertyValue('--room6FanRadStep'))   || -1;
      const indices = [...Array(fanN).keys()].map(i => i - (fanN-1)/2);
      const topSide = -1;
      const drawOrder = (topSide >= 0) ? indices : [...indices].reverse();
      drawOrder.forEach(idx => appendCardAt(4, idx*stepT, idx*stepR, idx*spread, null, true));
    }
  }

  if (mission==='1-4' && specifiedRooms.has(4)) {
    appendCardAt(4, -6, 0, -6, { fill: '#0b1530', stroke: '#ffffff' }, true);
    appendCardAt(4,  6, 0,  6, { fill: '#ffffff', stroke: '#000000' }, true);
  }

  function appendDisallowedCards(room, labels){

    const spread = 60;
    const stepT = 14;
    const stepR = -1;
    const indices = [...Array(fanN).keys()].map(i => i - (fanN - 1) / 2);
    const drawOrder = [...indices].reverse();
    const paint = { fill: fillRoom6, stroke: strokeRoom6 };
    drawOrder.forEach((idx, i) => {
      appendLabeledCardAt(room, String(labels[i]), {
        extraTan: idx * stepT,
        extraRad: idx * stepR,
        extraRot: idx * spread,
        sizeScale: 0.7,
        paint,
        flipDirection: true,
        textColor: '#d4af37',
        textRotateDeg: 180,
        textSizeDelta: 1
      });
    });

    const roomMidDeg = (room - 1) * 60 + 30;
    const markerTr = [
      'translate(150,150)',
      `rotate(${roomMidDeg})`,
      `translate(${(roomTan[room]||0)}, 0)`,
      `translate(0, ${-(rBase + (roomRad[room]||0) + cardH * 0.4)})`,
      `rotate(${inwardBase + (roomAdjust[room]||0)})`,
      `translate(${localX}, ${localY})`
    ].join(' ');

    markerCircle.setAttribute('r', String(markerRadius));
    markerCircle.setAttribute('fill', '#4a2c1f');
    markerCircle.setAttribute('stroke', '#d4af37');
    markerCircle.setAttribute('stroke-width', '1.6');
    markerG.appendChild(markerCircle);

    const cross1 = document.createElementNS('http://www.w3.org/2000/svg','line');

    cross1.setAttribute('stroke-width', '1.5');

  }

  if (mission === '2-1') {
    STAGE_PROHIBIT_ROOMS['2-1'].forEach((room) => appendDisallowedCards(room, ['1', '2', '3']));
  }
  if (mission === '2-2') {
    STAGE_PROHIBIT_ROOMS['2-2'].forEach((room) => appendDisallowedCards(room, ['7', '8', '9']));
  }
  if (mission === '2-3') {
    appendDisallowedCards(1, ['1', '2', '3']);
    appendDisallowedCards(3, ['4', '5', '6']);
    appendDisallowedCards(4, ['7', '8', '9']);
    appendDisallowedCards(6, ['10', '11', '12']);
  }

  if (mission === '3-1') {
    appendPlusMinusCards(4);
  }
  if (mission === '3-2') {
    appendClockRoom(1, { blackclock: true, centerScale: 2.5 });
    appendPlusMinusCards(3, { sign: '-' });
    appendPlusMinusCards(6, { sign: '-' });
  }
  if (mission === '3-3') {
    appendPlusMinusCards(1, { sign: '-' });
    const doubleclock = getDoubleclockSpec('3-3');
    const clockGap = Math.max(10, Number(doubleclock?.gap) || 12);
    appendClockRoom(2, { extraTan: -clockGap, text: String(doubleclock?.left || '1'), sizeScale: 0.9 });
    appendClockRoom(2, { extraTan: clockGap, text: String(doubleclock?.right || '2'), sizeScale: 0.9 });
    appendPlusMinusCards(5, { sign: '+' });
  }
  if (mission === '3-4') {
    appendPlusMinusCards(1, { sign: '+', centerFill: '#111111', centerStroke: '#ffffff' });
    appendLabeledCardAt(3, '', {
      extraTan: -8,
      extraRot: -10,
      paint: { fill: '#a0522d', stroke: '#111111' },
      flipDirection: true
    });
    appendLabeledCardAt(3, '', {
      extraTan: 8,
      extraRot: 10,
      paint: { fill: '#a0522d', stroke: '#111111' },
      flipDirection: true
    });
    appendPlusMinusCards(5, { sign: '-', centerFill: '#ffffff', centerStroke: '#111111' });
  }
  if (mission === '4-1') {
    appendLabeledCardAt(5, '', {
      paint: { fill: '#a0522d', stroke: '#111111' },
      flipDirection: true
    });
  }
  if (mission === '4-2') {
    appendPlusMinusCards(1, { sign: '+' });
    appendClockRoom(6, { text: '1' });
  }
  if (mission === '4-3') {
    STAGE_PROHIBIT_ROOMS['4-3'].forEach((room) => appendDisallowedCards(room, ['1', '2', '3']));
  }
  if (mission === '4-4') {
    appendPlusMinusCards(4, { sign: '-' });
    appendPlusMinusCards(5, { sign: '+' });
  }
  if (mission === '5-2') {
    appendPlusMinusCards(6, { sign: '-' });
  }
  if (mission === '5-3') {
    appendPlusMinusCards(1, { sign: '+' });
    appendPlusMinusCards(6, { sign: '-' });
  }
  if (mission === '5-4') {
    appendClockRoom(2, { text: '3' });
    appendWhiteBlackPair(3);
    appendWhiteBlackPair(4);
    appendClockRoom(5, { text: '2' });
  }
  if (mission === '6-1') {
    appendPlusMinusCards(6, { sign: '-' });
  }
  if (mission === '6-2') {
    appendDisallowedCards(1, ['1', '2', '3']);
    appendWhiteBlackPair(2);
  }
  if (mission === '6-3') {
    const doubleclock = getDoubleclockSpec('6-3');
    const clockGap = Math.max(10, Number(doubleclock?.gap) || 12);
    appendClockRoom(5, { extraTan: -clockGap, text: String(doubleclock?.left || '2'), sizeScale: 0.9 });
    appendClockRoom(5, { extraTan: clockGap, text: String(doubleclock?.right || '3'), sizeScale: 0.9 });
  }
  if (mission === '6-4') {
    appendPlusMinusCards(1, { sign: '-', centerFill: '#ffffff', centerStroke: '#111111' });
    appendPlusMinusCards(4, { sign: '+', centerFill: '#111111', centerStroke: '#ffffff' });
  }
  if (mission === '4-1') {
    appendCenterBrownPair({ halfGapDelta: -2, leftBackCount: 2, centerRightArrow: true, leftSign: '+', rightSign: '-' });
  } else if (mission === '4-2') {
    appendCenterBrownPair({ halfGapDelta: -2, leftBackCount: 2, centerRightArrow: true, leftSign: '-', rightSign: '+' });
  } else if (mission === '4-3' || mission === '4-4') {
    appendCenterBrownPair({ halfGapDelta: -2, leftBackCount: 2, centerRightArrow: true, lockOnArrow: true });
  } else if (typeof mission === 'string' && mission.startsWith('5-')) {
    appendCenterBrownPair({ sizeDelta: 3, overlap: true });
  } else if (typeof mission === 'string' && mission.startsWith('6-')) {
    appendCenterBrownPair({ centerSign: '‐', halfGapDelta: -1 });
  }
  if (mission === '2-4') {
    appendCenterEyeCross();
  }
}

function renderPlayedCards(){
  const g = stageSvg.querySelector('#playedCards');
  if(!g) return;
  while(g.firstChild) g.removeChild(g.firstChild);

  const cs13 = getComputedStyle(stageSvg);
  const cardW = parseFloat(cs13.getPropertyValue('--cardW')) || 26;
  const cardH = parseFloat(cs13.getPropertyValue('--cardH')) || 36;
  const cardR = parseFloat(cs13.getPropertyValue('--cardR')) || 4;
  const sw = parseFloat(cs13.getPropertyValue('--cardStrokeW')) || 1;
  const playedList = getPlayedEntriesSorted();

  const layoutMap = getPlayedCardLayouts(playedList);
  playedList.forEach((cardData) => {
    const isInFlight = inFlightPlayedCardKeys.has(cardData.key);
    if (isInFlight && state.currentPhase !== 'reveal') return;
    const layout = layoutMap.get(cardData.key);
    if (!layout) return;

    const cardG = document.createElementNS('http://www.w3.org/2000/svg','g');
    cardG.setAttribute('class', 'played-card-entry');
    cardG.dataset.baseX = String(layout.x);
    cardG.dataset.baseY = String(layout.y);
    cardG.dataset.baseRot = String(layout.rot);
    cardG.setAttribute('transform', getPlayedCardEntryTransform(layout.x, layout.y, layout.rot));

    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x', (-cardW/2).toFixed(3));
    rect.setAttribute('y', (-cardH/2).toFixed(3));
    rect.setAttribute('width', cardW);
    rect.setAttribute('height', cardH);
    rect.setAttribute('rx', cardR);
    rect.setAttribute('ry', cardR);
    const isBlack = cardData.color === 'black';
    const isFaceUp = cardData.face !== 'back';
    rect.setAttribute('fill', isFaceUp ? (isBlack ? '#0b1530' : '#fff') : (isBlack ? '#0b1530' : '#f3f4f6'));
    rect.setAttribute('stroke', isFaceUp ? (isBlack ? '#0b1530' : '#ddd') : (isBlack ? '#58606f' : '#cfcfcf'));
    rect.setAttribute('stroke-width', sw);
    cardG.appendChild(rect);

    if (isFaceUp){
      const fontSize = Math.max(8, cardW * 0.55);
      const text = document.createElementNS('http://www.w3.org/2000/svg','text');
      text.textContent = String(cardData.num);
      text.setAttribute('x', '0');
      text.setAttribute('y', '0');
      text.setAttribute('fill', isBlack ? '#fff' : '#111');
      text.setAttribute('font-size', String(fontSize));
      text.setAttribute('font-weight', '700');
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'middle');
      cardG.appendChild(text);

      if (isUnderlineTargetNumber(cardData.num)){
        const underline = document.createElementNS('http://www.w3.org/2000/svg','line');
        underline.setAttribute('x1', String(-(fontSize * 0.22)));
        underline.setAttribute('x2', String(fontSize * 0.22));
        underline.setAttribute('y1', String(fontSize * 0.34));
        underline.setAttribute('y2', String(fontSize * 0.34));
        underline.setAttribute('stroke', isBlack ? '#fff' : '#111');
        underline.setAttribute('stroke-width', '1.5');
        underline.setAttribute('stroke-linecap', 'round');
        cardG.appendChild(underline);
      }
    }

    g.appendChild(cardG);
  });
}

function rotatePointAroundBoardCenter(x, y, deg){
  const rad = Number(deg) * Math.PI / 180;
  const dx = Number(x) - 150;
  const dy = Number(y) - 150;
  return {
    x: 150 + dx * Math.cos(rad) - dy * Math.sin(rad),
    y: 150 + dx * Math.sin(rad) + dy * Math.cos(rad)
  };
}

function getCounterRotatedLocalPoint(baseX, baseY){
  return rotatePointAroundBoardCenter(baseX, baseY, -boardRotationDeg);
}

function getPlayedCardEntryTransform(baseX, baseY, baseRot){
  const p = getCounterRotatedLocalPoint(baseX, baseY);
  return `translate(${p.x},${p.y}) rotate(${Number(baseRot) - boardRotationDeg})`;
}

function getPlayedCardLayouts(playedList = getPlayedEntriesSorted()){
  const { centerR, outerOffset, guideR } = getGuideMetrics();
  const cs13 = getComputedStyle(stageSvg);
  const cardW = parseFloat(cs13.getPropertyValue('--cardW')) || 26;
  const step = cardW + 3;
  const layoutMap = new Map();
  const locationGroups = new Map();

  playedList.forEach((cardData) => {
    const room = Number(cardData.room);
    if (!room || room < 1 || room > 6) return;
    const placementRotationDeg = Number(cardData.boardRotationAtPlacement || 0);
    const worldMidDeg = normalizeDeg((room - 1) * 60 + 30 + placementRotationDeg);
    const worldRoomIndex = ((Math.round((worldMidDeg - 30) / 60) % 6) + 6) % 6;
    const key = String(worldRoomIndex);
    if (!locationGroups.has(key)) locationGroups.set(key, []);
    locationGroups.get(key).push(cardData);
  });

  locationGroups.forEach((cards, key) => {
    if (!cards.length) return;
    const worldRoomIndex = Number(key);
    const midDeg = worldRoomIndex * 60 + 30;
    const pOuter = polar(centerR + guideR * 0.5 + outerOffset, midDeg);
    const angleToCenter = Math.atan2(-pOuter.y, -pOuter.x) * 180 / Math.PI;
    const rot = angleToCenter + 90;
    const rotRad = rot * Math.PI / 180;
    const dirX = Math.cos(rotRad);
    const dirY = Math.sin(rotRad);
    const centerOffset = (cards.length - 1) / 2;

    cards.forEach((cardData, idx) => {
      const offset = (idx - centerOffset) * step;
      layoutMap.set(cardData.key, {
        x: 150 + pOuter.x + dirX * offset,
        y: 150 + pOuter.y + dirY * offset,
        rot
      });
    });
  });
  return layoutMap;
}

function buildFlyingCard(cardData, width, height){
  const card = document.createElement('div');
  card.className = 'flying-play-card';
  card.style.width = `${Math.max(18, width)}px`;
  card.style.height = `${Math.max(24, height)}px`;
  const isBlack = cardData.color === 'black';
  const isFaceUp = cardData.face !== 'back';
  if (isFaceUp){
    setCardNumberDom(card, cardData.num);
    card.style.fontSize = `${Math.max(10, Math.round(Math.min(width, height) * 0.55))}px`;
    card.style.background = isBlack ? '#0b1530' : '#fff';
    card.style.color = isBlack ? '#fff' : '#111';
    card.style.border = isBlack ? '1px solid #0b1530' : '1px solid #ddd';
  } else {
    card.textContent = '';
    card.style.background = isBlack
      ? getBlackBackGradient()
      : 'repeating-linear-gradient(135deg,#f9fafb 0px,#f9fafb 4px,#e5e7eb 4px,#e5e7eb 8px)';
    card.style.border = isBlack ? '1px solid #58606f' : '1px solid #cfcfcf';
  }
  return card;
}

function getPlayedCardPixelSize(){
  const cs13 = getComputedStyle(stageSvg);
  const cardW = parseFloat(cs13.getPropertyValue('--cardW')) || 26;
  const cardH = parseFloat(cs13.getPropertyValue('--cardH')) || 36;
  const ctm = stageSvg.getScreenCTM();
  const scaleX = ctm ? Math.hypot(ctm.a, ctm.b) : 1;
  const scaleY = ctm ? Math.hypot(ctm.c, ctm.d) : 1;
  return {
    w: Math.max(16, cardW * scaleX),
    h: Math.max(22, cardH * scaleY)
  };
}

function getRemoteCardSourceCenter(playerId){
  const tag = playerCircle.querySelector(`.player-tag[data-player-id="${playerId}"]`);
  if (!tag) return null;
  const miniCards = tag.querySelectorAll('.mini-hand .mini-card');
  const lastMiniCard = miniCards.length ? miniCards[miniCards.length - 1] : null;
  if (lastMiniCard){
    const miniRect = lastMiniCard.getBoundingClientRect();
    lastMiniCard.style.visibility = 'hidden';
    requestAnimationFrame(() => {
      if (lastMiniCard.isConnected) lastMiniCard.style.visibility = '';
    });
    return {
      x: miniRect.left + miniRect.width / 2,
      y: miniRect.top + miniRect.height / 2
    };
  }
  const tagRect = tag.getBoundingClientRect();
  return {
    x: tagRect.left + tagRect.width / 2,
    y: tagRect.bottom + 18
  };
}

function animateRemotePlayedCards(entries){
  const playedList = getPlayedEntriesSorted();
  const layoutMap = getPlayedCardLayouts(playedList);
  const targetCardSize = getPlayedCardPixelSize();
  entries.forEach((entry) => {
    const source = getRemoteCardSourceCenter(entry.playerId);
    const target = layoutMap.get(entry.key);
    if (!source || !target){
      inFlightPlayedCardKeys.delete(entry.key);
      renderPlayedCards();
      return;
    }
    const localTarget = getCounterRotatedLocalPoint(target.x, target.y);
    const targetClient = svgToClientPoint(localTarget.x, localTarget.y);
    const flyer = buildFlyingCard(entry, targetCardSize.w, targetCardSize.h);
    flyer.style.left = `${source.x - targetCardSize.w / 2}px`;
    flyer.style.top = `${source.y - targetCardSize.h / 2}px`;
    flyer.style.transform = 'translate(0,0) rotate(0deg)';
    document.body.appendChild(flyer);

    requestAnimationFrame(() => {
      const dx = targetClient.x - source.x;
      const dy = targetClient.y - source.y;
      flyer.style.transform = `translate(${dx}px, ${dy}px) rotate(${target.rot}deg)`;
    });

    const cleanup = () => {
      flyer.removeEventListener('transitionend', cleanup);
      flyer.remove();
      inFlightPlayedCardKeys.delete(entry.key);
      renderPlayedCards();
    };
    flyer.addEventListener('transitionend', cleanup);
    setTimeout(cleanup, 1100);
  });
}

function renderRoomTotals(){
  const g = stageSvg.querySelector('#roomTotals');
  if (!g) return;
  while (g.firstChild) g.removeChild(g.firstChild);
  if (state.currentPhase !== 'reveal') return;

  const { centerR, outerOffset, guideR } = getGuideMetrics();
  const roomCardsMap = getRoomCardsMap();
  const revealTick = Number(state.phaseState?.revealTick || 0);
  let canShowNextRoom = true;
  for (let room = 1; room <= 6; room++){
    if (!canShowNextRoom) break;
    const cards = roomCardsMap.get(room) || [];
    if (!cards.length) continue;
    const roomFullyRevealed = cards.every((card) => card.face !== 'back');
    if (!roomFullyRevealed){
      canShowNextRoom = false;
      continue;
    }
    const latestRoomRevealTs = cards.reduce((latestTs, card) => {
      const ts = Number(card.revealedAt || 0);
      return ts > latestTs ? ts : latestTs;
    }, 0);
    const roomReadyBaseTs = Math.max(revealTick, latestRoomRevealTs);
    const waitMs = roomReadyBaseTs + ROOM_TOTAL_DISPLAY_DELAY_MS - Date.now();
    if (waitMs > 0){
      scheduleRoomTotalsRefresh(waitMs);
      canShowNextRoom = false;
      continue;
    }

    const sum = getRoomResultValue(currentStage, cards);
    const midDeg = (room - 1) * 60 + 30;
    const pOuter = polar(centerR + guideR * 0.5 + outerOffset, midDeg);
    const x = 150 + pOuter.x;
    const y = 150 + pOuter.y;

    const tableWrap = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    tableWrap.setAttribute('class', 'room-total-table');
    tableWrap.dataset.cx = String(x);
    tableWrap.dataset.cy = String(y);
    tableWrap.setAttribute('transform', `translate(${x},${y}) rotate(${-boardRotationDeg})`);
    g.appendChild(tableWrap);

    const table = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    table.setAttribute('x', '-14');
    table.setAttribute('y', '-12');
    table.setAttribute('width', '28');
    table.setAttribute('height', '24');
    table.setAttribute('rx', '8');
    table.setAttribute('ry', '8');
    table.setAttribute('fill', 'rgba(31, 41, 55, 0.58)');
    table.setAttribute('stroke', 'none');
    tableWrap.appendChild(table);

    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.textContent = String(sum);
    text.setAttribute('x', '0');
    text.setAttribute('y', '0');
    text.setAttribute('fill', '#fff');
    text.setAttribute('font-size', '15');
    text.setAttribute('font-weight', '800');
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'middle');
    tableWrap.appendChild(text);
  }
}

function renderRoomGuideCircles(mission = currentStage){
  if (!STAGE_CODES.includes(mission)) return;
  const g = stageSvg.querySelector('#roomGuideCircles');
  if(!g) return;
  while(g.firstChild) g.removeChild(g.firstChild);

  const csGuide = getComputedStyle(stageSvg);
  const centerR = parseFloat(csGuide.getPropertyValue('--roomGuideCenterR')) || ((innerR + outerR) / 2);
  const guideR = parseFloat(csGuide.getPropertyValue('--roomGuideR')) || Math.max(8, (outerR - innerR) / 2 - 2);
  const dragFill = csGuide.getPropertyValue('--roomGuideDragFill').trim() || '#93c5fd';
  const dragHoverFill = csGuide.getPropertyValue('--roomGuideDragHoverFill').trim() || '#60a5fa';
  const dragOpacity = Math.max(0, Math.min(1, parseFloat(csGuide.getPropertyValue('--roomGuideDragOpacity')) || 0.2));
  const dragHoverOpacity = Math.max(0, Math.min(1, parseFloat(csGuide.getPropertyValue('--roomGuideDragHoverOpacity')) || 0.34));
  const normalOpacity = Math.max(0, Math.min(1, parseFloat(csGuide.getPropertyValue('--roomGuideNormalOpacity')) || 1));
  const isDragging = !!activeDrag;

  for(let room=1; room<=6; room++){
    const midDeg = (room-1)*60 + 30;
    const pInner = polar(centerR, midDeg);
    const canDrop = !!activeDrag && canPlaceCardInRoom(activeDrag.cardData, room, mission);
    const isHoverInner = canDrop && dragHoverRoom === room;
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx', pInner.x.toFixed(2));
    circle.setAttribute('cy', pInner.y.toFixed(2));
    circle.setAttribute('r', guideR.toFixed(2));
    circle.setAttribute('stroke', 'none');
    if (isDragging){
      if (canDrop){
        circle.setAttribute('fill', isHoverInner ? dragHoverFill : dragFill);
        circle.setAttribute('fill-opacity', String(isHoverInner ? dragHoverOpacity : dragOpacity));
      } else {
        circle.setAttribute('fill', 'none');
        circle.setAttribute('fill-opacity', '0');
      }
    } else {
      circle.setAttribute('fill', 'none');
      circle.setAttribute('fill-opacity', String(normalOpacity));
    }
    g.appendChild(circle);
  }
}

function renderRoomTexts(mission){
  const g = stageSvg.querySelector('#roomTexts');
  if(!g) return;
  while (g.firstChild) g.removeChild(g.firstChild);

  const csT = getComputedStyle(stageSvg);
  const color  = csT.getPropertyValue('--roomTextColor').trim() || '#d4a373';
  const fsize  = csT.getPropertyValue('--roomTextSize').trim()  || '12px';
  const weight = csT.getPropertyValue('--roomTextWeight').trim()|| '800';

  const bgColor   = csT.getPropertyValue('--roomTextBg').trim() || '#000';
  const bgOpacity = Math.max(0, Math.min(1, parseFloat(csT.getPropertyValue('--roomTextBgOpacity')) || 1));
  const fsNum     = parseFloat(fsize) || 12;
  const rBgVar    = parseFloat(csT.getPropertyValue('--roomTextBgR'));
  const rBg       = Number.isNaN(rBgVar) ? (fsNum * 0.95) : rBgVar;
  const delta = parseFloat(csT.getPropertyValue('--roomTextDeltaR')) || 0;
  const rText = (innerR + innerR2) / 2 + delta;
  const closecardBgColor = getComputedStyle(stageSvg).getPropertyValue('--gold').trim() || '#d4af37';
  function makeClosecardTextSpec(room, label, rotate, { underline = false } = {}){
    return {
      room,
      label,
      rotate,
      color: '#111',
      bgColor: closecardBgColor,
      bgOpacity: 1,
      underline
    };
  }

  const textSpecs = [];
  if (mission === '1-2') {
    textSpecs.push({ room: 3, label: '8-12', rotate: (midDeg)=>midDeg });
  }
  if (mission === '1-3') {
    textSpecs.push({ room: 6, label: '20-30', rotate: (midDeg)=>midDeg + 180 });
  }
  if (mission === '1-4') {
    textSpecs.push(makeClosecardTextSpec(1, '6', (midDeg)=>midDeg, { underline: true }));
  }
  if (mission === '3-1') {
    textSpecs.push(makeClosecardTextSpec(6, '20', (midDeg)=>midDeg + 180));
  }
  if (mission === '3-4') {
    textSpecs.push(makeClosecardTextSpec(4, '6', (midDeg)=>midDeg + 180));
  }
  if (mission === '4-4') {
    textSpecs.push(makeClosecardTextSpec(3, '12', (midDeg)=>midDeg));
  }
  if (mission === '5-2') {
    textSpecs.push(makeClosecardTextSpec(4, '15', (midDeg)=>midDeg + 180));
  }
  if (mission === '6-3') {
    textSpecs.push(makeClosecardTextSpec(2, '12', (midDeg)=>midDeg + 180));
  }
  if (mission === '6-4') {
    textSpecs.push(makeClosecardTextSpec(2, '24', (midDeg)=>midDeg + 180));
  }
  if (textSpecs.length === 0) return;

  textSpecs.forEach(({room, label, rotate, color: textColor, bgColor: circleColor, bgOpacity: circleOpacity, underline})=>{
    const midDeg = (room-1)*60 + 30;
    const p = polar(rText, midDeg);

    const bgCircle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    bgCircle.setAttribute('cx', p.x.toFixed(2));
    bgCircle.setAttribute('cy', p.y.toFixed(2));
    bgCircle.setAttribute('r',  rBg.toFixed(2));
    bgCircle.setAttribute('fill', circleColor || bgColor);
    bgCircle.setAttribute('fill-opacity', String(circleOpacity ?? bgOpacity));
    g.appendChild(bgCircle);

    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.textContent = label;
    text.setAttribute('x', p.x.toFixed(2));
    text.setAttribute('y', p.y.toFixed(2));
    text.setAttribute('fill', textColor || color);
    text.setAttribute('font-size', fsize);
    text.setAttribute('font-weight', weight);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'middle');
    text.setAttribute('transform', `rotate(${rotate(midDeg)}, ${p.x.toFixed(2)}, ${p.y.toFixed(2)})`);
    g.appendChild(text);

    if (underline) {
      const fs = parseFloat(fsize) || 12;
      const underlineLine = document.createElementNS('http://www.w3.org/2000/svg','line');
      underlineLine.setAttribute('x1', (p.x - fs * 0.22).toFixed(2));
      underlineLine.setAttribute('x2', (p.x + fs * 0.22).toFixed(2));
      underlineLine.setAttribute('y1', (p.y + fs * 0.36).toFixed(2));
      underlineLine.setAttribute('y2', (p.y + fs * 0.36).toFixed(2));
      underlineLine.setAttribute('stroke', textColor || color);
      underlineLine.setAttribute('stroke-width', '1.4');
      underlineLine.setAttribute('stroke-linecap', 'round');
      underlineLine.setAttribute('transform', `rotate(${rotate(midDeg)}, ${p.x.toFixed(2)}, ${p.y.toFixed(2)})`);
      g.appendChild(underlineLine);
    }
  });
}

function getStageRoomHintText(stage, room){
  const placementRule = getRoomPlacementRule(stage, room);
  const sumCondition = (STAGE_ROOM_SUCCESS_CONDITIONS[stage] || []).find((cond) => Number(cond.room) === Number(room));
  const clockLabels = getClockLabelsForMission(stage);
  const clockLabel = clockLabels?.[room];
  const clockRooms = getClockRoomsForMission(stage);
  const isClockRoom = clockRooms.includes(room);
  const browncardsCount = getBrowncardsCountForMission(stage, room);
  const closecardTarget = getClosecardLabelForMission(stage, room);
  const plusMinusSign = getPlusMinusSignForMission(stage, room);

  if (clockLabel){
    return `${clockLabel}枚目のカードは必ずここに置かなければならない。それ以降に他のカードを置いてもよい。`;
  }
  if (isClockRoom){
    if (stage === '3-2' && room === 1){
      return '最後の一枚のカードはこのエリアに置かなければならない。';
    }
    const doubleclock = getDoubleclockSpec(stage);
    if (doubleclock && Number(doubleclock.room) === Number(room)){
      const left = String(doubleclock?.left || '1');
      const right = String(doubleclock?.right || '2');
      return `${right}枚目と${left}枚目のカードはこのエリアに置かなければならない。`;
    }
    return 'clockroom：時計マークで指定されたエリア。';
  }
  if (closecardTarget){
    return `もっとも${closecardTarget}に近いエリアがこのエリアでなければならない。`;
  }
  if (browncardsCount > 0){
    return `カードを必ず${browncardsCount}枚だけ置かなければならない。`;
  }
  if (plusMinusSign === '+' || plusMinusSign === '-'){
    let colorLabel = '';
    if (
      placementRule
      && Array.isArray(placementRule.allowedColors)
      && placementRule.allowedColors.length === 1
    ){
      const onlyColor = placementRule.allowedColors[0];
      if (onlyColor === 'black') colorLabel = '黒';
      if (onlyColor === 'white') colorLabel = '白';
    }
    if (plusMinusSign === '+'){
      return `このエリアに数値が最も高い${colorLabel}カードを出していなければならない。`;
    }
    return `このエリアに数値が最も低い${colorLabel}カードを出していなければならない。`;
  }

  if (stage === '3-1' && room === 4){
    return 'このエリアに最も大きい数値のカードが置かれていなければならない。';
  }
  if (stage === '3-2' && room === 3){
    return 'このエリアに最も小さい数値のカードが置かれていなければならない。';
  }
  if (stage === '3-2' && room === 6){
    return 'このエリアに最も小さい数値のカードが置かれていなければならない。';
  }
  if (stage === '3-3' && room === 1){
    return 'このエリアに最も小さい数値のカードが置かれていなければならない。';
  }
  if (stage === '3-3' && room === 5){
    return 'このエリアに最も大きい数値のカードが置かれていなければならない。';
  }
  if (stage === '3-4' && room === 1){
    return '最も大きい数値の黒カードがこのエリアに置かれていなければならない。';
  }
  if (stage === '3-4' && room === 5){
    return '最も小さい数値の白カードがこのエリアに置かれていなければならない。';
  }
  if (sumCondition){
    return `このエリアの合計値が必ず${sumCondition.min}~${sumCondition.max}の数値にならなければならない。`;
  }
  if (!placementRule){
    return '';
  }
  if (Array.isArray(placementRule.disallowedNums) && placementRule.disallowedNums.length){
    const nums = placementRule.disallowedNums.join(',');
    return `${nums}のカードはこのエリアに置けない。`;
  }
  if (
    placementRule.maxTotal === 1
    && Array.isArray(placementRule.allowedColors)
    && placementRule.allowedColors.length === 1
    && placementRule.allowedColors[0] === 'white'
  ){
    return '白カードを必ず1枚だけ置かなければならない。';
  }
  if (
    placementRule.maxTotal === 1
    && Array.isArray(placementRule.allowedColors)
    && placementRule.allowedColors.length === 1
    && placementRule.allowedColors[0] === 'black'
  ){
    return '黒カードを必ず1枚だけ置かなければならない。';
  }
  if (
    placementRule.maxTotal === 2
    && placementRule.perColorMax
    && Number(placementRule.perColorMax.white) === 1
    && Number(placementRule.perColorMax.black) === 1
  ){
    return '白カード、黒カードを必ず１枚ずつだけ置かなければならない。';
  }
  return '';
}

function renderRoomConditionHints(mission = currentStage){
  const g = stageSvg.querySelector('#roomConditionHints');
  if (!g) return;
  while (g.firstChild) g.removeChild(g.firstChild);
  syncStageTopHint(mission);
  if (!isStageTagPressed) return;
  if (!STAGE_CODES.includes(mission)) return;

  const specifiedRooms = getSpecifiedRoomsForMission(mission);
  const hasInfinity = ['1-1', '1-2', '1-3'].includes(mission);
  const { centerR, guideR, outerOffset } = getGuideMetrics();
  const defaultStyle = {
    maxCharsPerLine: 10,
    maxLines: 4,
    boxW: 96,
    lineH: 12,
    fontSize: 9.5
  };

  function appendHintTable(hintText, boxX, boxY, style = defaultStyle){
    if (!hintText) return;
    const {
      maxCharsPerLine,
      maxLines,
      boxW,
      lineH,
      fontSize
    } = style;
    const clampedX = boxX;
    const clampedY = boxY;

    const lines = hintText
      .split('\n')
      .flatMap((chunk) => {
        if (!chunk) return [''];
        const wrapped = [];
        for (let idx = 0; idx < chunk.length; idx += maxCharsPerLine){
          wrapped.push(chunk.slice(idx, idx + maxCharsPerLine));
        }
        return wrapped;
      });

    const tableWrap = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    tableWrap.setAttribute('class', 'room-hint-table');
    tableWrap.dataset.cx = String(clampedX);
    tableWrap.dataset.cy = String(clampedY);
    tableWrap.setAttribute('transform', `translate(${clampedX},${clampedY}) rotate(${-boardRotationDeg})`);
    g.appendChild(tableWrap);

    const table = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    table.setAttribute('rx', '10');
    table.setAttribute('ry', '10');
    table.setAttribute('fill', 'rgba(31, 41, 55, 0.72)');
    table.setAttribute('stroke', 'none');
    tableWrap.appendChild(table);

    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    const renderLines = lines.slice(0, maxLines);
    if (lines.length > maxLines){
      const lastIdx = renderLines.length - 1;
      renderLines[lastIdx] = `${renderLines[lastIdx].slice(0, Math.max(0, maxCharsPerLine - 1))}…`;
    }
    const finalFontSize = Math.min(Number(fontSize) || 9.5, 9.5);
    const paddingX = 1;
    const paddingY = 3;
    const maxLineLen = renderLines.reduce((max, line) => Math.max(max, line.length), 0);
    const textBlockW = maxLineLen * finalFontSize;
    const textBlockH = Math.max(1, renderLines.length) * lineH;
    const minBoxW = 56;
    const tableW = Math.max(minBoxW, textBlockW + paddingX * 2);
    const tableH = textBlockH + paddingY * 2;

    table.setAttribute('x', String(-tableW / 2));
    table.setAttribute('y', String(-tableH / 2));
    table.setAttribute('width', String(tableW));
    table.setAttribute('height', String(tableH));

    text.setAttribute('x', '0');
    text.setAttribute('y', String(-((renderLines.length - 1) * lineH) / 2));
    text.setAttribute('fill', '#fff');
    text.setAttribute('font-size', String(finalFontSize));
    text.setAttribute('font-weight', '700');
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'middle');
    renderLines.forEach((line, idx) => {
      const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
      tspan.textContent = line;
      tspan.setAttribute('x', '0');
      tspan.setAttribute('dy', idx === 0 ? '0' : String(lineH));
      text.appendChild(tspan);
    });
    tableWrap.appendChild(text);
  }

  if (!hasInfinity){
    appendHintTable('合計値が24を超えてはいけない。', 0, 0, {
      maxCharsPerLine: 10,
      maxLines: 3,
      boxW: 104,
      lineH: 11,
      fontSize: 9.5
    });
    if (mission === '2-4'){
      appendHintTable('カードをオモテでおくことができない。', 0, 48, {
        maxCharsPerLine: 10,
        maxLines: 3,
        boxW: 96,
        lineH: 11,
        fontSize: 9.5
      });
    }
    if (mission === '4-1'){
      appendHintTable('手札にある一番大きいカードをプレイしなければならない。', 0, 48, {
        maxCharsPerLine: 11,
        maxLines: 4,
        boxW: 100,
        lineH: 11,
        fontSize: 9.4
      });
    }
    if (mission === '4-2'){
      appendHintTable('手札にある一番小さいカードをプレイしなければならない。', 0, 48, {
        maxCharsPerLine: 11,
        maxLines: 4,
        boxW: 100,
        lineH: 11,
        fontSize: 9.4
      });
    }
    if (mission === '4-3' || mission === '4-4'){
      appendHintTable('手札を並び替えてはいけない。手札の左からプレイしなければならない。', 0, 48, {
        maxCharsPerLine: 11,
        maxLines: 5,
        boxW: 100,
        lineH: 11,
        fontSize: 9.4
      });
    }
    if (typeof mission === 'string' && mission.startsWith('5-')){
      appendHintTable('各エリアにカードを必ず2枚置かなければならない。', 0, 48, {
        maxCharsPerLine: 11,
        maxLines: 4,
        boxW: 98,
        lineH: 11,
        fontSize: 9.5
      });
    }
    if (typeof mission === 'string' && mission.startsWith('6-')){
      appendHintTable('各エリアにカードを必ず2枚置き、大きい値から小さい値を引いた数がエリアの値となる。', 0, 48, {
        maxCharsPerLine: 11,
        maxLines: 7,
        boxW: 120,
        lineH: 11,
        fontSize: 9.2
      });
    }
  }

  specifiedRooms.forEach((room) => {
    const hintText = getStageRoomHintText(mission, room);
    if (!hintText) return;
    const midDeg = (room - 1) * 60 + 30;
    const radialOut = centerR + guideR + outerOffset + 8;
    const pOuter = polar(radialOut, midDeg);
    appendHintTable(hintText, pOuter.x, pOuter.y);
  });
}

(function ensureLayerOrder(){
  const back  = stageSvg.querySelector('#innerRingsBack');
  const marks = stageSvg.querySelector('#stageMarks');
  const outG  = stageSvg.querySelector('#stageOutward');
  const innerLightFill = stageSvg.querySelector('#innerLightFill');
  const r2    = stageSvg.querySelector('#innerRing2Front');
  const orangeFill   = stageSvg.querySelector('#innerOrangeFill');
  const tiny20       = stageSvg.querySelector('#innerTiny20');
  const orangeStroke = stageSvg.querySelector('#innerRingsOrange');
  const infinityG    = stageSvg.querySelector('#r5Infinity');
  const spec         = stageSvg.querySelector('#stageSpecified');
  const clockMarks   = stageSvg.querySelector('#stageClockMarks');
  const centerLineG  = stageSvg.querySelector('#centerTopLineG');
  const tipG         = stageSvg.querySelector('#centerTopDiamondG');
  const roomGuideCircles = stageSvg.querySelector('#roomGuideCircles');
  const roomTexts    = stageSvg.querySelector('#roomTexts');
  const roomConditionHints = stageSvg.querySelector('#roomConditionHints');
  const cardsG       = stageSvg.querySelector('#roomCards');
  const playedCardsG = stageSvg.querySelector('#playedCards');
  const roomTotalsG  = stageSvg.querySelector('#roomTotals');

  const rot = parseFloat(getComputedStyle(stageSvg).getPropertyValue('--centerTopRotate')) || 0;
  centerLineG?.setAttribute('transform', `translate(150,150) rotate(${rot})`);
  tipG?.setAttribute('transform',         `translate(150,150) rotate(${rot})`);

  if (!back || !marks || !outG || !r2 || !orangeFill || !tiny20 || !orangeStroke || !infinityG || !spec || !clockMarks || !centerLineG || !tipG || !roomGuideCircles || !roomTexts || !roomConditionHints || !cardsG || !playedCardsG || !roomTotalsG) return;

  if (innerLightFill && innerLightFill.previousSibling !== outG) stageSvg.insertBefore(outG, innerLightFill);
  else if (!innerLightFill && back.previousSibling !== outG)     stageSvg.insertBefore(outG, back);
  if (back.nextSibling !== marks)        stageSvg.insertBefore(marks, back.nextSibling);
  if (marks.nextSibling !== r2)          stageSvg.insertBefore(r2,    marks.nextSibling);
  if (r2.nextSibling !== orangeFill)   stageSvg.insertBefore(orangeFill,   r2.nextSibling);
  if (orangeFill.nextSibling !== tiny20)        stageSvg.insertBefore(tiny20,       orangeFill.nextSibling);
  if (tiny20.nextSibling !== orangeStroke)      stageSvg.insertBefore(orangeStroke, tiny20.nextSibling);
  if (orangeStroke.nextSibling !== infinityG)   stageSvg.insertBefore(infinityG,    orangeStroke.nextSibling);
  if (infinityG.nextSibling !== spec)           stageSvg.insertBefore(spec,         infinityG.nextSibling);
  if (spec.nextSibling !== clockMarks)          stageSvg.insertBefore(clockMarks,   spec.nextSibling);
  if (clockMarks.nextSibling !== roomGuideCircles) stageSvg.insertBefore(roomGuideCircles, clockMarks.nextSibling);
  if (roomGuideCircles.nextSibling !== roomTexts) stageSvg.insertBefore(roomTexts, roomGuideCircles.nextSibling);
  if (roomTexts.nextSibling !== centerLineG) stageSvg.insertBefore(centerLineG, roomTexts.nextSibling);
  if (centerLineG.nextSibling !== tipG) stageSvg.insertBefore(tipG, centerLineG.nextSibling);
  if (centerLineG.nextSibling !== cardsG) stageSvg.insertBefore(cardsG, centerLineG.nextSibling);
  if (cardsG.nextSibling !== playedCardsG) stageSvg.insertBefore(playedCardsG, cardsG.nextSibling);
  if (playedCardsG.nextSibling !== roomConditionHints) stageSvg.insertBefore(roomConditionHints, playedCardsG.nextSibling);
  if (roomConditionHints.nextSibling !== roomTotalsG) stageSvg.insertBefore(roomTotalsG, roomConditionHints.nextSibling);
  if (stageSvg.lastElementChild !== roomTotalsG) stageSvg.appendChild(roomTotalsG);
})();

function redrawAll(m){
  if (typeof m === 'string') currentStage = m;
  const hasStage = STAGE_CODES.includes(currentStage);
  const renderStage = hasStage ? currentStage : '';
  const isStage24 = renderStage === '2-4';

  missionTextEl.textContent = renderStage;
  missionTextEl.style.display = isStage24 ? '' : 'none';
  missionTextEl.setAttribute('x', isStage24 ? '150' : '292');
  missionTextEl.setAttribute('y', isStage24 ? '142' : '22');
  missionTextEl.setAttribute('text-anchor', isStage24 ? 'middle' : 'end');
  missionTextEl.setAttribute('fill', isStage24 ? '#111' : '#8c5a22');
  missionTextEl.setAttribute('font-size', isStage24 ? '16' : '18');
  missionTextEl.setAttribute('font-weight', isStage24 ? '800' : '700');
  if (isStage24){
    while (missionTextEl.firstChild) missionTextEl.removeChild(missionTextEl.firstChild);
    ['カードをオモテでプレイできない。', 'カードをオモテで置くことができない。'].forEach((line, idx) => {
      const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
      tspan.textContent = line;
      tspan.setAttribute('x', '150');
      tspan.setAttribute('dy', idx === 0 ? '0' : '20');
      missionTextEl.appendChild(tspan);
    });
  }
  stageNameText.textContent = renderStage;
  const hideStageName = !renderStage || !state.joined;
  const hideStageGear = hideStageName || isStage24;
  stageNameTag.classList.toggle('hidden', hideStageName);
  stageNameGear.classList.toggle('hidden', hideStageGear);
  if (hideStageName) isStageTagPressed = false;
  syncStageTopHint(renderStage);
  renderMainGearVisual();
  applySubgearCountToDom();
  syncGearClickableState();

  applyMissionSkin(renderStage);
  applyCenterNeedleRotation(centerNeedleRotationDeg, { animate: false, useShortestPath: true });
  renderEqTriBackFill(renderStage);
  updateOrangeGraphics();
  renderInnerTinyDiv();
  renderCenterTopDiamond();
  if (centerTopLineG && centerTopDiamondG){
    if (centerTopLineG.nextSibling !== centerTopDiamondG){
      stageSvg.insertBefore(centerTopLineG, centerTopDiamondG);
    }
    if (stageSvg.lastElementChild !== centerTopDiamondG){
      stageSvg.appendChild(centerTopDiamondG);
    }
  }

  if (!hasStage){
    [stageMarksG, stageOutG, stageSpecifiedG, stageClockG].forEach(group => {
      if (!group) return;
      while (group.firstChild) group.removeChild(group.firstChild);
    });
    const infinityG = stageSvg.querySelector('#r5Infinity');
    if (infinityG){
      while (infinityG.firstChild) infinityG.removeChild(infinityG.firstChild);
    }
    const roomTextsG = stageSvg.querySelector('#roomTexts');
    if (roomTextsG){
      while (roomTextsG.firstChild) roomTextsG.removeChild(roomTextsG.firstChild);
    }
    const roomCardsG = stageSvg.querySelector('#roomCards');
    if (roomCardsG){
      while (roomCardsG.firstChild) roomCardsG.removeChild(roomCardsG.firstChild);
    }
    const playedCardsG = stageSvg.querySelector('#playedCards');
    if (playedCardsG){
      while (playedCardsG.firstChild) playedCardsG.removeChild(playedCardsG.firstChild);
    }
    const roomTotalsG = stageSvg.querySelector('#roomTotals');
    if (roomTotalsG){
      while (roomTotalsG.firstChild) roomTotalsG.removeChild(roomTotalsG.firstChild);
    }
    const roomGuideCirclesG = stageSvg.querySelector('#roomGuideCircles');
    if (roomGuideCirclesG){
      while (roomGuideCirclesG.firstChild) roomGuideCirclesG.removeChild(roomGuideCirclesG.firstChild);
    }
    const roomConditionHintsG = stageSvg.querySelector('#roomConditionHints');
    if (roomConditionHintsG){
      while (roomConditionHintsG.firstChild) roomConditionHintsG.removeChild(roomConditionHintsG.firstChild);
    }
    return;
  }

  renderStageMarks(renderStage);
  renderOutwardMarks(renderStage);
  renderSpecifiedBowls(renderStage);
  renderClockMarks(renderStage);
  renderInfinity(renderStage);
  renderRoomGuideCircles(renderStage);
  renderRoomTexts(renderStage);
  renderRoomConditionHints(renderStage);
  renderRoomCards(renderStage);
  renderPlayedCards();
  renderRoomTotals();
  if (centerTopLineG && centerTopDiamondG){
    stageSvg.appendChild(centerTopLineG);
    stageSvg.appendChild(centerTopDiamondG);
  }
}
window.addEventListener('mission:change', (e)=>{
  redrawAll(e.detail?.value || currentStage);
});
redrawAll(currentStage);
renderStageOptions();
</script>
