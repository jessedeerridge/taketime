function renderCenterTopDiamond(){
  const g = stageSvg.querySelector('#centerTopDiamondG');
  if(!g) return;
  while(g.firstChild) g.removeChild(g.firstChild);

  const cs12 = getComputedStyle(stageSvg);
  const r1 = parseFloat(cs12.getPropertyValue('--innerR')) || 65;
  const offset = parseFloat(cs12.getPropertyValue('--tipDiaOffset')) || 0;

  const w = Math.abs(parseFloat(cs12.getPropertyValue('--tipDiaW')) || 6);
  const h = Math.abs(parseFloat(cs12.getPropertyValue('--tipDiaH')) || 8);

  const fill   = cs12.getPropertyValue('--tipDiaFill').trim()   || '#facc15';
  const stroke = cs12.getPropertyValue('--tipDiaStroke').trim() || 'none';
  const sw     = Math.max(0, parseFloat(cs12.getPropertyValue('--tipDiaStrokeW')) || 0);

  const cx = 0;
  const cy = -r1 - offset;

  const pTop =   {x: cx,     y: cy - h};
  const pRight = {x: cx + w, y: cy    };
  const pBottom={x: cx,     y: cy + h};
  const pLeft =  {x: cx - w, y: cy    };

  const d = `M ${pLeft.x},${pLeft.y} L ${pTop.x},${pTop.y} L ${pRight.x},${pRight.y} L ${pBottom.x},${pBottom.y} Z`;
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', d);
  path.setAttribute('fill', fill);
  path.setAttribute('stroke', stroke);
  path.setAttribute('stroke-width', sw);
  g.appendChild(path);
}

function renderRoomCards(mission = currentStage){
  const g = stageSvg.querySelector('#roomCards');
  if(!g) return;
  while(g.firstChild) g.removeChild(g.firstChild);

  const cs13 = getComputedStyle(stageSvg);
  const cardW = parseFloat(cs13.getPropertyValue('--cardW')) || 26;
  const cardH = parseFloat(cs13.getPropertyValue('--cardH')) || 36;
  const cardR = parseFloat(cs13.getPropertyValue('--cardR')) || 4;

  const fillRoom1   = cs13.getPropertyValue('--cardFillRoom1').trim()   || '#ffffff';
  const fillRoom6   = cs13.getPropertyValue('--cardFillRoom6').trim()   || '#a0522d';
  const strokeRoom1 = cs13.getPropertyValue('--cardStrokeRoom1').trim() || '#9ca3af';
  const strokeRoom6 = cs13.getPropertyValue('--cardStrokeRoom6').trim() || '#000000';
  const fillRoom4   = cs13.getPropertyValue('--cardFillRoom4').trim()   || fillRoom6;
  const strokeRoom4 = cs13.getPropertyValue('--cardStrokeRoom4').trim() || strokeRoom6;

  const sw = parseFloat(cs13.getPropertyValue('--cardStrokeW')) || 1;

  const roomAdjust = {
    1: parseFloat(cs13.getPropertyValue('--cardRoom1Deg')) || 0,
    4: parseFloat(cs13.getPropertyValue('--cardRoom4Deg')) || 0,
    6: parseFloat(cs13.getPropertyValue('--cardRoom6Deg')) || 0
  };
  const faceCenter = (parseFloat(cs13.getPropertyValue('--cardFaceCenter')) || 0) == 1;
  const inwardBase = faceCenter ? 180 : 0;

  const baseOffset = parseFloat(cs13.getPropertyValue('--cardRadiusBaseOffset')) || 0;
  const roomRad = {
    1: parseFloat(cs13.getPropertyValue('--cardRoom1Rad')) || 0,
    4: parseFloat(cs13.getPropertyValue('--cardRoom4Rad')) || 0,
    6: parseFloat(cs13.getPropertyValue('--cardRoom6Rad')) || 0
  };
  const roomTan = {
    1: parseFloat(cs13.getPropertyValue('--cardRoom1Tan')) || 0,
    4: parseFloat(cs13.getPropertyValue('--cardRoom4Tan')) || 0,
    6: parseFloat(cs13.getPropertyValue('--cardRoom6Tan')) || 0
  };
  const localX = parseFloat(cs13.getPropertyValue('--cardLocalX')) || 0;
  const localY = parseFloat(cs13.getPropertyValue('--cardLocalY')) || 0;

  const rBase = (outerR + innerR) / 2 + baseOffset;
  function getFillStrokeFor(room){
    if(room===6) return {fill: fillRoom6, stroke: strokeRoom6};
    if(room===4 && mission==='1-2') return {fill: fillRoom4, stroke: strokeRoom4};
    return {fill: fillRoom1, stroke: strokeRoom1};
  }

  function appendCardAt(room, extraTan=0, extraRad=0, extraRot=0, paint=null, flipDirection=false){
    const midDeg = (room-1)*60 + 30;
    const rotBase = inwardBase + (roomAdjust[room]||0);
    const cardRot = flipDirection ? (rotBase + 180 - extraRot * 1) : (rotBase + extraRot);
    const tr = [
      'translate(150,150)',
      `rotate(${midDeg})`,
      `translate(${(roomTan[room]||0) + extraTan}, 0)`,
      `translate(0, ${-(rBase + (roomRad[room]||0) + extraRad)})`,
      `rotate(${cardRot})`,
      `translate(${localX}, ${localY})`
    ].join(' ');

    const defaultPaint = getFillStrokeFor(room);
    const fill = paint?.fill ?? defaultPaint.fill;
    const stroke = paint?.stroke ?? defaultPaint.stroke;

    const cardG = document.createElementNS('http://www.w3.org/2000/svg','g');
    cardG.setAttribute('transform', tr);

    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x', (-cardW/2).toFixed(3));
    rect.setAttribute('y', (-cardH/2).toFixed(3));
    rect.setAttribute('width',  cardW);
    rect.setAttribute('height', cardH);
    rect.setAttribute('rx', cardR);
    rect.setAttribute('ry', cardR);
    rect.setAttribute('fill',   fill);
    rect.setAttribute('stroke', stroke);
    rect.setAttribute('stroke-width', sw);
    cardG.appendChild(rect);

    g.appendChild(cardG);
  }

  function appendRoomBackground(room, {
    fill = '#ab5d1a',
    width = cardW * 2 + 16,
    height = cardH + 16,
    radius = cardR + 4
  } = {}){
    const midDeg = (room-1)*60 + 30;
    const tr = [
      'translate(150,150)',
      `rotate(${midDeg})`,
      `translate(${(roomTan[room]||0)}, 0)`,
      `translate(0, ${-(rBase + (roomRad[room]||0))})`,
      `rotate(${inwardBase + (roomAdjust[room]||0)})`,
      `translate(${localX}, ${localY})`
    ].join(' ');

    const bgG = document.createElementNS('http://www.w3.org/2000/svg','g');
    bgG.setAttribute('transform', tr);
    const bg = document.createElementNS('http://www.w3.org/2000/svg','rect');
    bg.setAttribute('x', (-width/2).toFixed(3));
    bg.setAttribute('y', (-height/2).toFixed(3));
    bg.setAttribute('width', width);
    bg.setAttribute('height', height);
    bg.setAttribute('rx', radius);
    bg.setAttribute('ry', radius);
    bg.setAttribute('fill', fill);
    bgG.appendChild(bg);
    g.appendChild(bgG);
  }

  const specifiedRooms = new Set(getSpecifiedRoomsForMission(mission));

  if (mission==='1-1'){
    if (specifiedRooms.has(1)) appendCardAt(1);
    if (specifiedRooms.has(6)) {
      const fanN   = Math.max(1, Math.round(parseFloat(cs13.getPropertyValue('--room6FanCount')) || 3));
      const spread = parseFloat(cs13.getPropertyValue('--room6FanSpreadDeg')) || 14;
      const stepT  = parseFloat(cs13.getPropertyValue('--room6FanTanStep'))   || 6;
      const stepR  = parseFloat(cs13.getPropertyValue('--room6FanRadStep'))   || -1;
      const indices = [...Array(fanN).keys()].map(i => i - (fanN-1)/2);
      const topSide = parseFloat(cs13.getPropertyValue('--room6FanTopSide')) || 1;
      const drawOrder = (topSide >= 0) ? indices : [...indices].reverse();
      drawOrder.forEach(idx => appendCardAt(6, idx*stepT, idx*stepR, idx*spread, null, true));
    }
  }

  if (mission==='1-2'){
    if (specifiedRooms.has(4)) {
      const fanN   = Math.max(1, Math.round(parseFloat(cs13.getPropertyValue('--room6FanCount')) || 3));
      const spread = parseFloat(cs13.getPropertyValue('--room6FanSpreadDeg')) || 14;
      const stepT  = parseFloat(cs13.getPropertyValue('--room6FanTanStep'))   || 6;
      const stepR  = parseFloat(cs13.getPropertyValue('--room6FanRadStep'))   || -1;
      const indices = [...Array(fanN).keys()].map(i => i - (fanN-1)/2);
      const topSide = -1;
      const drawOrder = (topSide >= 0) ? indices : [...indices].reverse();
      drawOrder.forEach(idx => appendCardAt(4, idx*stepT, idx*stepR, idx*spread, null, true));
    }
  }

  if (mission==='1-4' && specifiedRooms.has(4)) {
    appendCardAt(4, -6, 0, -6, { fill: '#0b1530', stroke: '#ffffff' }, true);
    appendCardAt(4,  6, 0,  6, { fill: '#ffffff', stroke: '#000000' }, true);
  }
}

function renderPlayedCards(){
  const g = stageSvg.querySelector('#playedCards');
  if(!g) return;
  while(g.firstChild) g.removeChild(g.firstChild);

  const cs13 = getComputedStyle(stageSvg);
  const cardW = parseFloat(cs13.getPropertyValue('--cardW')) || 26;
  const cardH = parseFloat(cs13.getPropertyValue('--cardH')) || 36;
  const cardR = parseFloat(cs13.getPropertyValue('--cardR')) || 4;
  const sw = parseFloat(cs13.getPropertyValue('--cardStrokeW')) || 1;
  const playedList = getPlayedEntriesSorted();

  const layoutMap = getPlayedCardLayouts(playedList);
  playedList.forEach((cardData) => {
    if (inFlightPlayedCardKeys.has(cardData.key)) return;
    const layout = layoutMap.get(cardData.key);
    if (!layout) return;

    const cardG = document.createElementNS('http://www.w3.org/2000/svg','g');
    cardG.setAttribute('transform', `translate(${layout.x},${layout.y}) rotate(${layout.rot})`);

    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x', (-cardW/2).toFixed(3));
    rect.setAttribute('y', (-cardH/2).toFixed(3));
    rect.setAttribute('width', cardW);
    rect.setAttribute('height', cardH);
    rect.setAttribute('rx', cardR);
    rect.setAttribute('ry', cardR);
    const isBlack = cardData.color === 'black';
    const isFaceUp = cardData.face !== 'back';
    rect.setAttribute('fill', isFaceUp ? (isBlack ? '#0b1530' : '#fff') : (isBlack ? '#13234d' : '#f3f4f6'));
    rect.setAttribute('stroke', isFaceUp ? (isBlack ? '#0b1530' : '#ddd') : (isBlack ? '#0b1530' : '#cfcfcf'));
    rect.setAttribute('stroke-width', sw);
    cardG.appendChild(rect);

    if (isFaceUp){
      const fontSize = Math.max(8, cardW * 0.55);
      const text = document.createElementNS('http://www.w3.org/2000/svg','text');
      text.textContent = String(cardData.num);
      text.setAttribute('x', '0');
      text.setAttribute('y', '0');
      text.setAttribute('fill', isBlack ? '#fff' : '#111');
      text.setAttribute('font-size', String(fontSize));
      text.setAttribute('font-weight', '700');
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'middle');
      cardG.appendChild(text);

      if (isUnderlineTargetNumber(cardData.num)){
        const underline = document.createElementNS('http://www.w3.org/2000/svg','line');
        underline.setAttribute('x1', String(-(fontSize * 0.22)));
        underline.setAttribute('x2', String(fontSize * 0.22));
        underline.setAttribute('y1', String(fontSize * 0.34));
        underline.setAttribute('y2', String(fontSize * 0.34));
        underline.setAttribute('stroke', isBlack ? '#fff' : '#111');
        underline.setAttribute('stroke-width', '1.5');
        underline.setAttribute('stroke-linecap', 'round');
        cardG.appendChild(underline);
      }
    }

    g.appendChild(cardG);
  });
}

function getPlayedCardLayouts(playedList = getPlayedEntriesSorted()){
  const { centerR, outerOffset, guideR } = getGuideMetrics();
  const cs13 = getComputedStyle(stageSvg);
  const cardW = parseFloat(cs13.getPropertyValue('--cardW')) || 26;
  const step = cardW + 3;
  const layoutMap = new Map();
  for(let room = 1; room <= 6; room++){
    const cards = playedList.filter((card) => Number(card.room) === room);
    if (!cards.length) continue;

    const midDeg = (room - 1) * 60 + 30;
    const pOuter = polar(centerR + guideR * 0.5 + outerOffset, midDeg);
    const angleToCenter = Math.atan2(-pOuter.y, -pOuter.x) * 180 / Math.PI;
    const rot = angleToCenter + 90;
    const rotRad = rot * Math.PI / 180;
    const dirX = Math.cos(rotRad);
    const dirY = Math.sin(rotRad);
    const centerOffset = (cards.length - 1) / 2;

    cards.forEach((cardData, idx) => {
      const offset = (idx - centerOffset) * step;
      layoutMap.set(cardData.key, {
        x: 150 + pOuter.x + dirX * offset,
        y: 150 + pOuter.y + dirY * offset,
        rot
      });
    });
  }
  return layoutMap;
}

function buildFlyingCard(cardData, width, height){
  const card = document.createElement('div');
  card.className = 'flying-play-card';
  card.style.width = `${Math.max(18, width)}px`;
  card.style.height = `${Math.max(24, height)}px`;
  const isBlack = cardData.color === 'black';
  const isFaceUp = cardData.face !== 'back';
  if (isFaceUp){
    setCardNumberDom(card, cardData.num);
    card.style.fontSize = `${Math.max(10, Math.round(Math.min(width, height) * 0.55))}px`;
    card.style.background = isBlack ? '#0b1530' : '#fff';
    card.style.color = isBlack ? '#fff' : '#111';
    card.style.border = isBlack ? '1px solid #0b1530' : '1px solid #ddd';
  } else {
    card.textContent = '';
    card.style.background = isBlack
      ? 'repeating-linear-gradient(135deg,#13234d 0px,#13234d 4px,#1f356e 4px,#1f356e 8px)'
      : 'repeating-linear-gradient(135deg,#f9fafb 0px,#f9fafb 4px,#e5e7eb 4px,#e5e7eb 8px)';
    card.style.border = isBlack ? '1px solid #0b1530' : '1px solid #cfcfcf';
  }
  return card;
}

function getPlayedCardPixelSize(){
  const cs13 = getComputedStyle(stageSvg);
  const cardW = parseFloat(cs13.getPropertyValue('--cardW')) || 26;
  const cardH = parseFloat(cs13.getPropertyValue('--cardH')) || 36;
  const ctm = stageSvg.getScreenCTM();
  const scaleX = ctm ? Math.hypot(ctm.a, ctm.b) : 1;
  const scaleY = ctm ? Math.hypot(ctm.c, ctm.d) : 1;
  return {
    w: Math.max(16, cardW * scaleX),
    h: Math.max(22, cardH * scaleY)
  };
}

function getRemoteCardSourceCenter(playerId){
  const tag = playerCircle.querySelector(`.player-tag[data-player-id="${playerId}"]`);
  if (!tag) return null;
  const miniCards = tag.querySelectorAll('.mini-hand .mini-card');
  const lastMiniCard = miniCards.length ? miniCards[miniCards.length - 1] : null;
  if (lastMiniCard){
    const miniRect = lastMiniCard.getBoundingClientRect();
    lastMiniCard.style.visibility = 'hidden';
    requestAnimationFrame(() => {
      if (lastMiniCard.isConnected) lastMiniCard.style.visibility = '';
    });
    return {
      x: miniRect.left + miniRect.width / 2,
      y: miniRect.top + miniRect.height / 2
    };
  }
  const tagRect = tag.getBoundingClientRect();
  return {
    x: tagRect.left + tagRect.width / 2,
    y: tagRect.bottom + 18
  };
}

function animateRemotePlayedCards(entries){
  const playedList = getPlayedEntriesSorted();
  const layoutMap = getPlayedCardLayouts(playedList);
  const targetCardSize = getPlayedCardPixelSize();
  entries.forEach((entry) => {
    const source = getRemoteCardSourceCenter(entry.playerId);
    const target = layoutMap.get(entry.key);
    if (!source || !target){
      inFlightPlayedCardKeys.delete(entry.key);
      renderPlayedCards();
      return;
    }
    const targetClient = svgToClientPoint(target.x, target.y);
    const flyer = buildFlyingCard(entry, targetCardSize.w, targetCardSize.h);
    flyer.style.left = `${source.x - targetCardSize.w / 2}px`;
    flyer.style.top = `${source.y - targetCardSize.h / 2}px`;
    flyer.style.transform = 'translate(0,0) rotate(0deg)';
    document.body.appendChild(flyer);

    requestAnimationFrame(() => {
      const dx = targetClient.x - source.x;
      const dy = targetClient.y - source.y;
      flyer.style.transform = `translate(${dx}px, ${dy}px) rotate(${target.rot}deg)`;
    });

    const cleanup = () => {
      flyer.removeEventListener('transitionend', cleanup);
      flyer.remove();
      inFlightPlayedCardKeys.delete(entry.key);
      renderPlayedCards();
    };
    flyer.addEventListener('transitionend', cleanup);
    setTimeout(cleanup, 1100);
  });
}

function renderRoomTotals(){
  const g = stageSvg.querySelector('#roomTotals');
  if (!g) return;
  while (g.firstChild) g.removeChild(g.firstChild);
  if (state.currentPhase !== 'reveal') return;

  const { centerR, outerOffset, guideR } = getGuideMetrics();
  const roomCardsMap = getRoomCardsMap();
  const revealTick = Number(state.phaseState?.revealTick || 0);
  let canShowNextRoom = true;
  for (let room = 1; room <= 6; room++){
    if (!canShowNextRoom) break;
    const cards = roomCardsMap.get(room) || [];
    if (!cards.length) continue;
    const roomFullyRevealed = cards.every((card) => card.face !== 'back');
    if (!roomFullyRevealed){
      canShowNextRoom = false;
      continue;
    }
    const latestRoomRevealTs = cards.reduce((latestTs, card) => {
      const ts = Number(card.revealedAt || 0);
      return ts > latestTs ? ts : latestTs;
    }, 0);
    const roomReadyBaseTs = Math.max(revealTick, latestRoomRevealTs);
    const waitMs = roomReadyBaseTs + ROOM_TOTAL_DISPLAY_DELAY_MS - Date.now();
    if (waitMs > 0){
      scheduleRoomTotalsRefresh(waitMs);
      canShowNextRoom = false;
      continue;
    }

    const sum = cards.reduce((acc, card) => acc + Number(card.num || 0), 0);
    const midDeg = (room - 1) * 60 + 30;
    const pOuter = polar(centerR + guideR * 0.5 + outerOffset, midDeg);
    const x = 150 + pOuter.x;
    const y = 150 + pOuter.y;

    const table = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    table.setAttribute('x', String(x - 14));
    table.setAttribute('y', String(y - 12));
    table.setAttribute('width', '28');
    table.setAttribute('height', '24');
    table.setAttribute('rx', '8');
    table.setAttribute('ry', '8');
    table.setAttribute('fill', 'rgba(31, 41, 55, 0.58)');
    table.setAttribute('stroke', 'none');
    g.appendChild(table);

    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.textContent = String(sum);
    text.setAttribute('x', String(x));
    text.setAttribute('y', String(y));
    text.setAttribute('fill', '#fff');
    text.setAttribute('font-size', '15');
    text.setAttribute('font-weight', '800');
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'middle');
    g.appendChild(text);
  }
}

function renderRoomGuideCircles(mission = currentStage){
  if (!STAGE_CODES.includes(mission)) return;
  const g = stageSvg.querySelector('#roomGuideCircles');
  if(!g) return;
  while(g.firstChild) g.removeChild(g.firstChild);

  const csGuide = getComputedStyle(stageSvg);
  const centerR = parseFloat(csGuide.getPropertyValue('--roomGuideCenterR')) || ((innerR + outerR) / 2);
  const guideR = parseFloat(csGuide.getPropertyValue('--roomGuideR')) || Math.max(8, (outerR - innerR) / 2 - 2);
  const dragFill = csGuide.getPropertyValue('--roomGuideDragFill').trim() || '#93c5fd';
  const dragHoverFill = csGuide.getPropertyValue('--roomGuideDragHoverFill').trim() || '#60a5fa';
  const dragOpacity = Math.max(0, Math.min(1, parseFloat(csGuide.getPropertyValue('--roomGuideDragOpacity')) || 0.2));
  const dragHoverOpacity = Math.max(0, Math.min(1, parseFloat(csGuide.getPropertyValue('--roomGuideDragHoverOpacity')) || 0.34));
  const normalOpacity = Math.max(0, Math.min(1, parseFloat(csGuide.getPropertyValue('--roomGuideNormalOpacity')) || 1));
  const isDragging = !!activeDrag;

  for(let room=1; room<=6; room++){
    const midDeg = (room-1)*60 + 30;
    const pInner = polar(centerR, midDeg);
    const isHoverInner = dragHoverRoom === room;
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx', pInner.x.toFixed(2));
    circle.setAttribute('cy', pInner.y.toFixed(2));
    circle.setAttribute('r', guideR.toFixed(2));
    circle.setAttribute('stroke', 'none');
    if (isDragging){
      circle.setAttribute('fill', isHoverInner ? dragHoverFill : dragFill);
      circle.setAttribute('fill-opacity', String(isHoverInner ? dragHoverOpacity : dragOpacity));
    } else {
      circle.setAttribute('fill', 'none');
      circle.setAttribute('fill-opacity', String(normalOpacity));
    }
    g.appendChild(circle);
  }
}

function renderRoomTexts(mission){
  const g = stageSvg.querySelector('#roomTexts');
  if(!g) return;
  while (g.firstChild) g.removeChild(g.firstChild);

  const csT = getComputedStyle(stageSvg);
  const color  = csT.getPropertyValue('--roomTextColor').trim() || '#d4a373';
  const fsize  = csT.getPropertyValue('--roomTextSize').trim()  || '12px';
  const weight = csT.getPropertyValue('--roomTextWeight').trim()|| '800';

  const bgColor   = csT.getPropertyValue('--roomTextBg').trim() || '#000';
  const bgOpacity = Math.max(0, Math.min(1, parseFloat(csT.getPropertyValue('--roomTextBgOpacity')) || 1));
  const fsNum     = parseFloat(fsize) || 12;
  const rBgVar    = parseFloat(csT.getPropertyValue('--roomTextBgR'));
  const rBg       = Number.isNaN(rBgVar) ? (fsNum * 0.95) : rBgVar;
  const delta = parseFloat(csT.getPropertyValue('--roomTextDeltaR')) || 0;
  const rText = (innerR + innerR2) / 2 + delta;

  const textSpecs = [];
  if (mission === '1-2') {
    textSpecs.push({ room: 3, label: '8-12', rotate: (midDeg)=>midDeg });
  }
  if (mission === '1-3') {
    textSpecs.push({ room: 6, label: '20-30', rotate: (midDeg)=>midDeg + 180 });
  }
  if (textSpecs.length === 0) return;

  textSpecs.forEach(({room, label, rotate})=>{
    const midDeg = (room-1)*60 + 30;
    const p = polar(rText, midDeg);

    const bgCircle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    bgCircle.setAttribute('cx', p.x.toFixed(2));
    bgCircle.setAttribute('cy', p.y.toFixed(2));
    bgCircle.setAttribute('r',  rBg.toFixed(2));
    bgCircle.setAttribute('fill', bgColor);
    bgCircle.setAttribute('fill-opacity', String(bgOpacity));
    g.appendChild(bgCircle);

    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.textContent = label;
    text.setAttribute('x', p.x.toFixed(2));
    text.setAttribute('y', p.y.toFixed(2));
    text.setAttribute('fill', color);
    text.setAttribute('font-size', fsize);
    text.setAttribute('font-weight', weight);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'middle');
    text.setAttribute('transform', `rotate(${rotate(midDeg)}, ${p.x.toFixed(2)}, ${p.y.toFixed(2)})`);
    g.appendChild(text);
  });
}

(function ensureLayerOrder(){
  const back  = stageSvg.querySelector('#innerRingsBack');
  const marks = stageSvg.querySelector('#stageMarks');
  const outG  = stageSvg.querySelector('#stageOutward');
  const innerLightFill = stageSvg.querySelector('#innerLightFill');
  const r2    = stageSvg.querySelector('#innerRing2Front');
  const orangeFill   = stageSvg.querySelector('#innerOrangeFill');
  const tiny20       = stageSvg.querySelector('#innerTiny20');
  const orangeStroke = stageSvg.querySelector('#innerRingsOrange');
  const infinityG    = stageSvg.querySelector('#r5Infinity');
  const spec         = stageSvg.querySelector('#stageSpecified');
  const clockMarks   = stageSvg.querySelector('#stageClockMarks');
  const centerLineG  = stageSvg.querySelector('#centerTopLineG');
  const tipG         = stageSvg.querySelector('#centerTopDiamondG');
  const roomGuideCircles = stageSvg.querySelector('#roomGuideCircles');
  const roomTexts    = stageSvg.querySelector('#roomTexts');
  const cardsG       = stageSvg.querySelector('#roomCards');
  const playedCardsG = stageSvg.querySelector('#playedCards');
  const roomTotalsG  = stageSvg.querySelector('#roomTotals');

  const rot = parseFloat(getComputedStyle(stageSvg).getPropertyValue('--centerTopRotate')) || 0;
  centerLineG?.setAttribute('transform', `translate(150,150) rotate(${rot})`);
  tipG?.setAttribute('transform',         `translate(150,150) rotate(${rot})`);

  if (!back || !marks || !outG || !r2 || !orangeFill || !tiny20 || !orangeStroke || !infinityG || !spec || !clockMarks || !centerLineG || !tipG || !roomGuideCircles || !roomTexts || !cardsG || !playedCardsG || !roomTotalsG) return;

  if (innerLightFill && innerLightFill.previousSibling !== outG) stageSvg.insertBefore(outG, innerLightFill);
  else if (!innerLightFill && back.previousSibling !== outG)     stageSvg.insertBefore(outG, back);
  if (back.nextSibling !== marks)        stageSvg.insertBefore(marks, back.nextSibling);
  if (marks.nextSibling !== r2)          stageSvg.insertBefore(r2,    marks.nextSibling);
  if (r2.nextSibling !== tipG)           stageSvg.insertBefore(tipG,  r2.nextSibling);
  if (tipG.nextSibling !== centerLineG)  stageSvg.insertBefore(centerLineG, tipG.nextSibling);
  if (centerLineG.nextSibling !== orangeFill)   stageSvg.insertBefore(orangeFill,   centerLineG.nextSibling);
  if (orangeFill.nextSibling !== tiny20)        stageSvg.insertBefore(tiny20,       orangeFill.nextSibling);
  if (tiny20.nextSibling !== orangeStroke)      stageSvg.insertBefore(orangeStroke, tiny20.nextSibling);
  if (orangeStroke.nextSibling !== infinityG)   stageSvg.insertBefore(infinityG,    orangeStroke.nextSibling);
  if (infinityG.nextSibling !== spec)           stageSvg.insertBefore(spec,         infinityG.nextSibling);
  if (spec.nextSibling !== clockMarks)          stageSvg.insertBefore(clockMarks,   spec.nextSibling);
  if (clockMarks.nextSibling !== roomGuideCircles) stageSvg.insertBefore(roomGuideCircles, clockMarks.nextSibling);
  if (roomGuideCircles.nextSibling !== roomTexts) stageSvg.insertBefore(roomTexts, roomGuideCircles.nextSibling);

  if (cardsG.nextSibling !== playedCardsG) stageSvg.insertBefore(playedCardsG, cardsG.nextSibling);
  if (playedCardsG.nextSibling !== roomTotalsG) stageSvg.insertBefore(roomTotalsG, playedCardsG.nextSibling);
  if (stageSvg.lastElementChild !== roomTotalsG) stageSvg.appendChild(roomTotalsG);
})();

function redrawAll(m){
  if (typeof m === 'string') currentStage = m;
  const hasStage = STAGE_CODES.includes(currentStage);
  const renderStage = hasStage ? currentStage : '';

  missionTextEl.textContent = renderStage;
  stageNameText.textContent = renderStage;
  stageNameTag.classList.toggle('hidden', !renderStage || !state.joined);

  applyMissionSkin(renderStage);
  renderEqTriBackFill(renderStage);
  updateOrangeGraphics();
  renderInnerTinyDiv();
  renderCenterTopDiamond();

  if (!hasStage){
    [stageMarksG, stageOutG, stageSpecifiedG, stageClockG].forEach(group => {
      if (!group) return;
      while (group.firstChild) group.removeChild(group.firstChild);
    });
    const infinityG = stageSvg.querySelector('#r5Infinity');
    if (infinityG){
      while (infinityG.firstChild) infinityG.removeChild(infinityG.firstChild);
    }
    const roomTextsG = stageSvg.querySelector('#roomTexts');
    if (roomTextsG){
      while (roomTextsG.firstChild) roomTextsG.removeChild(roomTextsG.firstChild);
    }
    const roomCardsG = stageSvg.querySelector('#roomCards');
    if (roomCardsG){
      while (roomCardsG.firstChild) roomCardsG.removeChild(roomCardsG.firstChild);
    }
    const playedCardsG = stageSvg.querySelector('#playedCards');
    if (playedCardsG){
      while (playedCardsG.firstChild) playedCardsG.removeChild(playedCardsG.firstChild);
    }
    const roomTotalsG = stageSvg.querySelector('#roomTotals');
    if (roomTotalsG){
      while (roomTotalsG.firstChild) roomTotalsG.removeChild(roomTotalsG.firstChild);
    }
    const roomGuideCirclesG = stageSvg.querySelector('#roomGuideCircles');
    if (roomGuideCirclesG){
      while (roomGuideCirclesG.firstChild) roomGuideCirclesG.removeChild(roomGuideCirclesG.firstChild);
    }
    return;
  }

  renderStageMarks(renderStage);
  renderOutwardMarks(renderStage);
  renderSpecifiedBowls(renderStage);
  renderClockMarks(renderStage);
  renderInfinity(renderStage);
  renderRoomGuideCircles(renderStage);
  renderRoomTexts(renderStage);
  renderRoomCards(renderStage);
  renderPlayedCards();
  renderRoomTotals();
}
window.addEventListener('mission:change', (e)=>{
  redrawAll(e.detail?.value || currentStage);
});
redrawAll(currentStage);
renderStageOptions();
</script>
