<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAKE TIME</title>
<style>
  :root{
    --black-card:#0b1530;
    --black-card-stripe:#1a274d;
    --black-card-border-soft:#58606f;
  }

  html, body{height:100%; overflow:hidden;}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#fff;color:#111;}
  header{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid #eee; position:sticky; top:0; z-index:400; background:#fff;}
  h1{margin:0;font-size:18px;}
  .small{font-size:12px;opacity:.75;}
  .join-box{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:12px; position:relative; z-index:2;}
  .join-box input{padding:8px;border:1px solid #ddd;border-radius:6px;font-size:16px;}
  .btn{padding:6px 10px;border:1px solid #ddd;border-radius:6px;background:#f8f8f8;cursor:pointer;}
  .btn.primary{background:#111;color:#fff;border-color:#111;}
  .btn.ghost{background:transparent;}
  .hidden{display:none;}
  #lobby{padding:20px;border-top:1px solid #eee; position:relative; z-index:2;}
  .copy-btn.copied, .btn.ghost.copied{background:var(--black-card);color:#fff;border-color:var(--black-card);}

  main{
    position:relative;
    height:calc(100vh - 60px);
    overflow:hidden;
    -webkit-overflow-scrolling:touch;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
  }
  main.prejoin{ background-image:url('taketimetop.jpg'); }
  main.joined{ background-image:url('taketimeback.jpg'); }
  .stage-name-wrap{
    position:absolute;
    top:0;
    right:0;
    z-index:210;
    display:flex;
    flex-direction:row;
    align-items:center;
    gap:0px;
    pointer-events:none;
  }
  .stage-name-box{
    position:fixed;
    left:16px;
    bottom:16px;
    z-index:230;
    border:1px solid #111;
    border-collapse:separate;
    border-spacing:0;
    border-radius:12px;
    overflow:hidden;
    background:#fff;
    font-size:18px;
    pointer-events:auto;
  }
  .stage-name-box td{
    border:0;
    padding:5px 14px;
    color:#111;
    font-weight:700;
  }

  .stage-name-gear{
    width:144px;
    max-width:calc(100vw - 24px);
    height:auto;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.18));
    pointer-events:auto;
  }
  .stage-name-gear .eyeText{
    fill:#f8cb8d;
    font-size:26px;
    font-weight:700;
    text-anchor:middle;
    dominant-baseline:middle;
    font-family:Arial, "Hiragino Sans", "Yu Gothic", sans-serif;
  }
  .stage-name-gear .subgearBonusText{
    fill:#f8cb8d;
    font-size:18px;
    font-weight:800;
    text-anchor:middle;
    dominant-baseline:middle;
    font-family:Arial, "Hiragino Sans", "Yu Gothic", sans-serif;
  }
  .stage-name-gear .eyeStroke{
    fill:none;
    stroke:#f8cb8d;
    stroke-width:2.8;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .stage-name-gear .eyePupil{
    fill:none;
    stroke:#f8cb8d;
    stroke-width:2.3;
  }
  .stage-name-gear .eyeSlot.used .eyeStroke,
  .stage-name-gear .eyeSlot.used .eyePupil{
    stroke:#6b7280;
  }
  .stage-name-gear .eyeSlot.used .eyeText{
    fill:#6b7280;
  }
  .stage-name-gear .eyeSlot.used .subgearBonusText{
    fill:#6b7280;
  }
  .stage-name-gear .mainDivider{
    stroke:#f8cb8d;
    stroke-width:6;
    stroke-linecap:round;
  }
  .stage-name-gear.clickable{
    cursor:pointer;
  }
  .stage-top-hint{
    position:fixed;
    left:0;
    top:0;
    transform:translate(-50%,-50%);
    z-index:240;
    width:112px;
    max-width:calc(100vw - 24px);
    background:rgba(31, 41, 55, 0.72);
    color:#fff;
    border-radius:10px;
    padding:7px 10px;
    font-size:13px;
    font-weight:700;
    line-height:1.4;
    text-align:center;
    white-space:normal;
    word-break:break-word;
    box-shadow:none;
    pointer-events:none;
  }
  .stage-top-hint.hidden{display:none;}

  .seat-pop{
    position:fixed;left:50%;bottom:10px;transform:translateX(-50%);
    background:#fff;border:1px solid #111;border-radius:12px;
    box-shadow:0 12px 28px rgba(0,0,0,.12);
    padding:10px;z-index:220;display:flex;flex-direction:column;gap:10px;min-width:280px;
  }
  .seat-pop.hidden{display:none;}
  .seat-pop .row{display:flex;gap:8px;align-items:center;}
  .seat-pop label{width:84px;font-size:13px;}
  .seat-pop .tabs{display:flex;gap:6px;flex-wrap:wrap;}
  .tab{padding:6px 10px;border:1px solid #ddd;border-radius:999px;cursor:pointer;user-select:none;position:relative;}
  .tab.disabled{opacity:.45; pointer-events:none;}
  .tab.disabled::after{content:'✕';position:absolute;inset:0;display:grid;place-items:center;font-size:18px;font-weight:700;color:#b91c1c;pointer-events:none;}
  .tab.active{background:#111;color:#fff;border-color:#111;}
  .seat-pop .tab{
    background:#fff;
    color:#111;
    border-color:#111;
  }
  .seat-pop .tab.active{
    background:#fff;
    color:#111;
    border-color:#111;
    box-shadow:inset 0 0 0 1px #111;
  }
  .seat-pop .btn,
  .seat-pop .btn.primary{
    background:#fff;
    color:#111;
    border-color:#111;
  }

  .host-selecting-pop{
    position:fixed;left:50%;bottom:10px;transform:translateX(-50%);
    background:rgba(20,20,20,.92);color:#fff;
    padding:12px 16px;border-radius:14px;
    box-shadow:0 18px 40px rgba(0,0,0,.35);
    z-index:225;font-weight:800;white-space:nowrap;
    pointer-events:none;
  }
  .host-selecting-pop.hidden{display:none;}
  .phase-flow-pop{
    position:fixed;
    top:calc(50% - 40px);
    left:0;
    transform:translate(-130%, -50%);
    background:rgba(17,17,17,.94);
    color:#fff;
    padding:10px 18px;
    border-radius:18px;
    font-size:20px;
    font-weight:800;
    letter-spacing:.08em;
    box-shadow:0 12px 30px rgba(0,0,0,.3);
    z-index:260;
    pointer-events:none;
    opacity:0;
    white-space:nowrap;
  }
  .phase-flow-pop.run{
    animation:phaseFlowSlide 3.6s ease-in-out forwards;
  }
  @keyframes phaseFlowSlide{
    0%{transform:translate(-130%, -50%);opacity:0;}
    12%{opacity:1;}
    35%{transform:translate(calc(50vw - 50%), -50%);opacity:1;}
    76%{transform:translate(calc(50vw - 50%), -50%);opacity:1;}
    88%{opacity:1;}
    100%{transform:translate(calc(100vw + 140%), -50%);opacity:0;}
  }

  .table-center{
    position:relative;
    width:min(92vw, 360px);
    height:260px;
    margin:20px auto 0;
  }
  .player-circle{
    position:absolute;inset:0;
    width:100%;height:100%;
    margin:0;border-radius:50%;
    box-sizing:border-box;border:none;
    z-index:2;
    pointer-events:none;
  }
  .player-circle::before{content:'';}
  .player-tag{
    position:absolute;transform:translate(-50%,-50%);
    padding:4px 8px;border-radius:999px;background:#f8f8f8;
    border:1px solid #ddd;font-size:12px;white-space:nowrap;
    pointer-events:auto;
  }
  .player-tag.me{ background:#111;color:#fff;border-color:#111; }

  .player-tag .mini-hand{
    position:absolute;left:50%;top:100%;
    transform:translate(-50%,3px);
    width:92px;height:48px;pointer-events:none;
  }
  .player-tag .mini-card{
    position:absolute;left:50%;top:0;
    width:24px;height:33px;
    border-radius:5px;
    font-size:10px;display:flex;align-items:center;justify-content:center;
    transform-origin:bottom center;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
    box-sizing:border-box;
  }

  .player-tag .mini-card.back-white{
    background:
      repeating-linear-gradient(
        135deg,
        #ffffff 0px,
        #ffffff 4px,
        #e5e7eb 4px,
        #e5e7eb 8px
      );
    border:1px solid #cfcfcf;
  }

  .player-tag .mini-card.back-black{
    background:
      repeating-linear-gradient(
        135deg,
        var(--black-card) 0px,
        var(--black-card) 4px,
        var(--black-card-stripe) 4px,
        var(--black-card-stripe) 8px
      );
    border:1px solid var(--black-card-border-soft);
  }

  .stage-board-wrap{
    position:absolute;inset:0;
    margin:0;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:1;
  }

  .my-hand-wrapper{
    margin-top:46px;
    text-align:center;
    min-height:160px;
  }
  .my-hand-title{display:none;}
  .my-hand{
    --hand-offset-y:0px;
    display:flex;
    justify-content:center;
    gap:8px;
    margin-top:2px;
    min-height:64px;
    transform:translateY(var(--hand-offset-y));
  }
  .my-card{
    width:60px;height:90px;border-radius:8px;border:1px solid #ddd;background:#fff;
    display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:600;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
    touch-action:none;
    cursor:grab;
  }
  .card-num-underlined{
    display:inline-block;
    border-bottom:2px solid currentColor;
    line-height:1;
    padding-bottom:1px;
  }
  .my-card.dragging{opacity:.45;cursor:grabbing;}
  .flying-play-card{
    position:fixed;
    margin:0;
    z-index:520;
    pointer-events:none;
    transition:transform .78s cubic-bezier(.2,.8,.2,1), opacity .24s linear;
    will-change:transform, opacity;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:5px;
    box-sizing:border-box;
    box-shadow:0 2px 6px rgba(0,0,0,.2);
    font-weight:700;
  }
  .my-card.turn-pulse:not(.dragging){
    animation:myCardTurnPulse 1.05s ease-in-out infinite;
    transform-origin:center;
    will-change:transform;
  }
  .my-card.reserve-slide-in{
    animation:reserveSlideIn .42s cubic-bezier(.22,.8,.25,1) both;
  }
  @keyframes myCardTurnPulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.08);}
  }
  @keyframes reserveSlideIn{
    0%{transform:translateX(84px);opacity:0;}
    100%{transform:translateX(0);opacity:1;}
  }

  .mini-hand.turn-pulse{
    animation:miniHandTurnPulse 1.05s ease-in-out infinite;
    transform-origin:50% 0%;
    will-change:transform;
  }
  @keyframes miniHandTurnPulse{
    0%,100%{transform:translate(-50%,3px) scale(1);}
    50%{transform:translate(-50%,3px) scale(1.12);}
  }

  .dialog-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,.35);
    display:flex;align-items:center;justify-content:center;z-index:300;
  }
  .dialog-backdrop.hidden{display:none;}
  .dialog-box{
    background:#fff;border-radius:12px;padding:16px 18px;
    box-shadow:0 18px 40px rgba(0,0,0,.35);
    max-width:320px;width:calc(100% - 40px);
  }
  .dialog-box p{margin:0 0 12px;font-size:14px;line-height:1.6;}
  .dialog-buttons{display:flex;justify-content:flex-end;gap:8px;}
  .card-choice-dialog .dialog-box{
    max-width:260px;
  }
  .card-choice-row{
    display:flex;
    justify-content:center;
    gap:8px;
  }
  .choice-card{
    width:60px;
    height:90px;
    border-radius:8px;
    border:1px solid #ddd;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:600;
    cursor:pointer;
    touch-action:manipulation;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
  }
  .choice-card.back-white{
    background:
      repeating-linear-gradient(
        135deg,
        #ffffff 0px,
        #ffffff 4px,
        #e5e7eb 4px,
        #e5e7eb 8px
      );
    border:1px solid #cfcfcf;
  }
  .choice-card.back-black{
    background:
      repeating-linear-gradient(
        135deg,
        var(--black-card) 0px,
        var(--black-card) 4px,
        var(--black-card-stripe) 4px,
        var(--black-card-stripe) 8px
      );
    border:1px solid var(--black-card-border-soft);
  }

  .host-settings-btn{
    position:fixed;bottom:16px;width:44px;height:44px;border-radius:50%;
    border:1px solid #ddd;background:#fff;box-shadow:0 8px 20px rgba(0,0,0,.18);
    display:none;align-items:center;justify-content:center;font-size:22px;cursor:pointer;z-index:230;
  }
  .host-settings-btn{right:16px;}
  .host-settings-btn.visible{display:flex;}
  .host-stage-ready-btn{
    position:fixed;bottom:16px;right:66px;width:44px;height:44px;border-radius:50%;
    border:1px solid #111;background:#111;color:#fff;box-shadow:0 8px 20px rgba(0,0,0,.18);
    display:none;align-items:center;justify-content:center;font-size:20px;font-weight:800;cursor:pointer;z-index:230;
  }
  .host-stage-ready-btn.visible{display:flex;}

  .start-pop,
  .stage-pop{
    position:fixed;background:#fff;border:1px solid #ddd;border-radius:12px;
    box-shadow:0 12px 28px rgba(0,0,0,.16);padding:10px 12px;z-index:240;min-width:260px;
    display:flex;flex-direction:column;gap:8px;
  }
  .start-pop{right:16px;bottom:72px;}
  .stage-pop{right:66px;bottom:72px;min-width:220px;}
  .start-pop.hidden,
  .stage-pop.hidden{display:none;}
  .start-pop-header,
  .stage-pop-header{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .start-pop-title,
  .stage-pop-title{font-size:14px;font-weight:600;}
  .start-pop-main,
  .stage-pop-main{font-size:13px;line-height:1.5;}
  .start-pop-actions,
  .stage-pop-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:4px;flex-wrap:wrap;}
  .start-pop-actions{flex-wrap:nowrap;align-items:center;}
  .start-pop-actions .btn{white-space:nowrap;}
  .stage-option-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;max-height:48vh;overflow:auto;}
  .stage-option-btn.active{background:#111;color:#fff;border-color:#111;}

  #roomInfoLobby, #lobby h2, #lobby p {display:none;}
  #lobby.entered{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:calc(100vh - 60px);
  }

  .help-pop-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,.35);
    display:flex;align-items:flex-end;justify-content:center;
    z-index:310;
    padding:16px;
  }
  .help-pop-backdrop.hidden{display:none;}
  .help-pop{
    width:min(520px, calc(100% - 0px));
    max-height:min(70vh, 640px);
    background:#fff;border:1px solid #ddd;border-radius:16px;
    box-shadow:0 18px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  .help-pop-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 12px;border-bottom:1px solid #eee;
  }
  .help-pop-title{font-weight:800;font-size:14px;}
  .help-pop-body{padding:12px;overflow:auto;max-height:calc(70vh - 48px);}
  .role-row{
    display:flex;gap:12px;align-items:flex-start;
    padding:10px 0;
  }
  .role-card{
    width:72px;height:108px;border-radius:10px;border:1px solid #ddd;background:#f8f8f8;
    box-shadow:0 6px 16px rgba(0,0,0,.10);
    flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;color:#444;
  }
  .role-desc{flex:1 1 auto;}
  .role-desc .name{font-weight:900;margin-bottom:4px;}
  .role-desc .text{font-size:13px;line-height:1.55;color:#222;white-space:pre-wrap;}

  /* ===== ステージSVG用：元コードの見た目をそのまま維持 ===== */
  #stageBoard{
    --size: 360;
    --bg: transparent;
    --light: #e6e3e3;
    --circleFill: var(--light);
    --triFill: var(--light);

    --outline: 1;

    --innerR: 65;
    --innerR2: 57;
    --innerR3: 52;

    --innerR4: 20;
    --innerR5: 14;
    --orange: #ab5d1a;
    --orangeFill: #ab5d1a;
    --orangeRingOpacity: 1;
    --ringStroke: #facc15;

    --gold: #d4af37;
    --bowlStrokeColor: var(--gold);

    --img1Scale: 1; --img1OffX: 0px; --img1OffY: 0px;
    --img3Scale: 1; --img3OffX: 0px; --img3OffY: 0px;

    --markAlpha: 1;
    --markStroke: #facc15;
    --markStrokeW: 1.2;
    --markLen: 17;
    --markSpreadDeg: 18;

    --diamondFill: #facc15;
    --diamondStroke: none;
    --diamondStrokeW: 0;
    --diamondW: 2.5;
    --diamondTop: 4;
    --diamondBot: 2;
    --diamondPos: 0.55;

    --centerLineColor: var(--gold);
    --centerLineW: 1.2;
    --centerLineGap: 1.0;

    --outTriStroke: #888;
    --outTriOpacity: 1;
    --outTriLen: 27;
    --outTriSpreadDeg: 32;
    --outTriDrawBase: 0;
    --outTriInset: 0;
    --outTriCurveK: 0.38;
    --outTriBaseCurveK: 0.25;

    --outTriBaseW: 2.6;
    --outTriTipW:  0.00000001;
    --outTriBaseW_B: 2.6;
    --outTriTipW_B:  2.6;
    --outTriBaseAsArc: 1;

    --goldXScale: 1.2;
    --goldXStrokeW: 0.6;

    --bowl-dip: 9;
    --bowl-halfW: 8;
    --bowl-extra: 4;
    --bowl-scale: 0.25;
    --bowl-gap: -13;
    --bowl-margin-deg: 8;
    --bowl-stroke: 3;
    --bowl-offset-x: 0;

    --bowlFillColor: #fff;
    --bowlFillOpacity: 1;
    --bowl-cap-R: 130;

    --innerTinyN: 24;
    --innerTinyTiltDeg: 50;
    --innerTinyColor: #facc15;
    --innerTinyW: 1.2;
    --innerTinyOpacity: 1;

    --centerTopColor: #facc15;
    --centerTopW: 4;

    --infinityColor: #fdba74;
    --infinityOpacity: 0.95;

    --tipDiaFill: #facc15;
    --tipDiaStroke: none;
    --tipDiaStrokeW: 0;
    --tipDiaW: 6;
    --tipDiaH: 8;
    --tipDiaOffset: 0;
    --tipDiaRingR: 11;
    --tipDiaRingW: 1.8;
    --tipDiaRingStroke: none;
    --tipDiaRingFill: none;
    --tipDiaHitR: 18;
    --centerTopRotate: 4;

    --cardW: 20;
    --cardH: 27;
    --cardR: 4;
    --cardStroke: #9ca3af;
    --cardStrokeW: 1;

    --cardFaceCenter: 1;
    --cardRoom1Deg: 0;
    --cardRoom6Deg: 0;
    --cardRoom4Deg: 0;

    --cardRadiusBaseOffset: 0;
    --cardRoom1Rad: -3;
    --cardRoom6Rad: -3;
    --cardRoom4Rad: -3;
    --cardRoom1Tan: 0;
    --cardRoom6Tan: 0;
    --cardRoom4Tan: 0;

    --cardLocalX: 0;
    --cardLocalY: 0;

    --room6FanCount: 3;
    --room6FanSpreadDeg: 14;
    --room6FanTanStep: 6;
    --room6FanRadStep: -1;
    --room6FanTopSide: 1;

    --cardFillRoom1: #ffffff;
    --cardFillRoom6: #a0522d;
    --cardStrokeRoom6: #000000;
    --cardFillRoom4: var(--cardFillRoom6);
    --cardStrokeRoom4: var(--cardStrokeRoom6);

    --roomTextColor: #d4a373;
    --roomTextSize: 14px;
    --roomTextWeight: 800;
    --roomTextDeltaR: 12px;
    --roomTextBg: #f7ac60;
    --roomTextBgOpacity: 0.3;
    --roomTextBgR: 12;

    --roomGuideCenterR: 90;
    --roomGuideR: 35;
    --roomGuideStroke: #8b6b4f;
    --roomGuideStrokeW: 1.4;
    --roomGuideDash: 2.2 4;
    --roomGuideOuterOffset: 0;
    --roomGuideDragFill: #93c5fd;
    --roomGuideDragHoverFill: #60a5fa;
    --roomGuideDragOpacity: 0.2;
    --roomGuideDragHoverOpacity: 0.34;
    --roomGuideNormalOpacity: 1;

    --clockMarkScale: 1;
    --clockMarkSize: 44;
    --clockMarkFill: #ffd8a8;
    --clockMarkStroke: #5c3a21;
    --clockMarkStrokeW: 2.8;
    --clockMarkTextColor: #2b2b2b;
    --clockMarkDeltaR: -8;
    --clockMarkTextScale: 1.08;

    width:min(92vw, calc(var(--size)*1px));
    height:auto;
    display:block;
  }
  #stageBoard .sharp{ stroke-linecap:butt; stroke-linejoin:miter; }
  #stageBoard #sectorHits .sector { fill: rgba(255,255,0,0); cursor: pointer; pointer-events: fill; }
  #stageBoard{
    overflow:visible;
    touch-action:none;
  }
  #stageBoard #rotationHandles{
    touch-action:none;
  }
  #stageBoard.rotating{
    cursor:grabbing;
  }
  #stageBoard .rotation-handle{
    fill:none;
    stroke:none;
    cursor:grab;
    pointer-events:all;
    touch-action:none;
  }
  #stageBoard .rotation-handle-hit{

function deriveCurrentPhase(phaseState){
  const discussionTick = Number(phaseState?.discussionTick || 0);
  const placementTick = Number(phaseState?.placementTick || 0);
  const revealTick = Number(phaseState?.revealTick || 0);
  const latest = Math.max(discussionTick, placementTick, revealTick);
  if (!latest) return '';
  if (latest === revealTick) return 'reveal';
  if (latest === placementTick) return 'placement';
  return 'discussion';
}

function getActiveTurnPlayerIds(){
  if (state.currentPhase !== 'placement') return [];
  const players = latestPlayers
    .filter((p) => p?.id)
    .map((p) => p.id);
  if (!players.length) return [];

  const playedList = Object.values(state.playedCards || {})
    .filter((card) => card?.playerId && players.includes(card.playerId))
    .sort((a, b) => Number(a.placedAt || 0) - Number(b.placedAt || 0));

  if (!playedList.length) return players;

  const firstPlayerId = playedList[0].playerId;
  const firstIndex = players.indexOf(firstPlayerId);
  if (firstIndex === -1) return [players[0]];
  const turnIndex = (firstIndex + playedList.length) % players.length;
  return [players[turnIndex]];
}

function isMyTurnInPlacement(){
  const activePlayers = getActiveTurnPlayerIds();
  return activePlayers.includes(state.userId);
}

function randomInt(max){
  return Math.floor(Math.random() * max);
}

function generateRandomHiraganaName(length = 3){
  const chars = [
    'あ','い','う','え','お',
    'か','き','く','け','こ',
    'さ','し','す','せ','そ',
    'た','ち','つ','て','と',
    'な','に','ぬ','ね','の',
    'は','ひ','ふ','へ','ほ',
    'ま','み','む','め','も',
    'や','ゆ','よ',
    'ら','り','る','れ','ろ',
    'わ','を','ん'
  ];
  let name = '';
  for(let i = 0; i < length; i++){
    name += chars[randomInt(chars.length)];
  }
  return name;
}

function generateRoomCode(length = 5){
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let code = '';
  for(let i = 0; i < length; i++){
    code += chars.charAt(randomInt(chars.length));
  }
  return code;
}

function createDeck24(){
  const deck = [];
  for(let i = 1; i <= 12; i++) deck.push({ num: i, color: 'white' });
  for(let i = 1; i <= 12; i++) deck.push({ num: i, color: 'black' });
  return deck;
}

function shuffleArray(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function normalizeName(raw){
  const trimmed = (raw || '').trim();
  if (trimmed) return trimmed.slice(0, 4);
  return generateRandomHiraganaName(3);
}

function normalizeRoomCode(raw){
  const trimmed = (raw || '').trim().toUpperCase();
  if (trimmed) return trimmed;
  return generateRoomCode(5);
}

function getMainGearDivisionCount(){
  const seatedCount = latestPlayers.length;
  if (seatedCount <= 2) return 2;
  if (seatedCount === 3) return 3;
  return 4;
}

function getFacePlacementLimit(){
  return getMainGearDivisionCount() + currentSubgearCount;
}

function getCurrentFacePlacementCount(){
  return Object.values(state.playedCards || {}).reduce((sum, card) => {
    if (!card || card.face === 'back') return sum;
    return sum + 1;
  }, 0);
}

function canPlaceFaceCard(){
  if (currentStage === '2-4') return false;
  return getCurrentFacePlacementCount() < getFacePlacementLimit();
}

function syncGearEyeState(){
  const usedCount = getCurrentFacePlacementCount();
  const visibleCount = getFacePlacementLimit();
  const eyeSlots = [
    ...Array.from(mainGearEyes?.querySelectorAll('.eyeSlot') || []),
    ...subgearEyeEls.filter((el, idx) => !!el && idx < currentSubgearCount)
  ];
  eyeSlots.forEach((eyeEl, idx) => {
    const slotNumber = idx + 1;
    eyeEl.classList.toggle('used', slotNumber <= usedCount);
  });
  subgearEyeEls.forEach((eyeEl, idx) => {
    if (!eyeEl) return;
    eyeEl.classList.toggle('used', (getMainGearDivisionCount() + idx + 1) <= usedCount);
  });
  stageNameGear.title = `公開で置ける残り回数: ${Math.max(0, visibleCount - usedCount)}`;
}

function renderMainGearVisual(){
  if (!mainGearDividers || !mainGearEyes) return;
  while (mainGearDividers.firstChild) mainGearDividers.removeChild(mainGearDividers.firstChild);
  while (mainGearEyes.firstChild) mainGearEyes.removeChild(mainGearEyes.firstChild);

  const divisionCount = getMainGearDivisionCount();
  const diameterAngles = divisionCount === 4 ? [0, 90] : (divisionCount === 2 ? [0] : []);
  const radialAngles = divisionCount === 3 ? [-90, 30, 150] : [];
  const eyeConfigs = divisionCount === 4
    ? [
        { x: -34, y: -34, rot: -45, scale: 1 },
        { x: 34, y: -34, rot: 45, scale: 1 },
        { x: 34, y: 34, rot: -45, scale: 1 },
        { x: -34, y: 34, rot: 45, scale: 1 }
      ]
    : divisionCount === 3
      ? [
          { x: -40, y: -22, rot: -60, scale: 1 },
          { x: 40, y: -22, rot: 60, scale: 1 },
          { x: 0, y: 46, rot: 180, scale: 1 }
        ]
      : [
          { x: 0, y: -50, rot: 0, scale: 1 },
          { x: 0, y: 50, rot: 180, scale: 1 }
        ];

  diameterAngles.forEach((angle) => {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('class', 'mainDivider');
    line.setAttribute('x1', '-74');
    line.setAttribute('y1', '0');
    line.setAttribute('x2', '74');
    line.setAttribute('y2', '0');
    line.setAttribute('transform', `rotate(${angle})`);
    mainGearDividers.appendChild(line);
  });

  radialAngles.forEach((angle) => {
    const rad = angle * Math.PI / 180;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('class', 'mainDivider');
    line.setAttribute('x1', '0');
    line.setAttribute('y1', '0');
    line.setAttribute('x2', String(Math.cos(rad) * 74));
    line.setAttribute('y2', String(Math.sin(rad) * 74));
    mainGearDividers.appendChild(line);
  });

  eyeConfigs.forEach(({ x, y, rot, scale }, idx) => {
    const eye = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    eye.setAttribute('class', 'eyeSlot');
    eye.dataset.eyeSlot = String(idx + 1);
    eye.setAttribute('transform', `translate(${x},${y}) rotate(${rot}) scale(${scale})`);
    eye.innerHTML = `
      <path class="eyeStroke" d="M -27 0 Q 0 -22 27 0 Q 0 22 -27 0 Z"></path>
      <circle class="eyePupil" cx="0" cy="0" r="10.5"></circle>
    `;
    mainGearEyes.appendChild(eye);
  });
  syncGearEyeState();
}

async function emitPhaseEvent(type){
  if (!state.roomCode || !state.isHost) return;
  const labels = {
    discussion: '議論フェーズ',
    placement: '配置フェーズ',
    reveal: '公開フェーズ'
  };
  const ts = Date.now();
  await set(ref(db, `rooms/${state.roomCode}/phaseEvent`), {
    type,
    label: labels[type] || '',
    ts,
    stage: currentStage || ''
  });
  await update(ref(db, `rooms/${state.roomCode}/phaseState`), {
    stage: currentStage || '',
    [`${type}Tick`]: ts
  });
}

function subscribeRoom(){
  const roomRef = ref(db, `rooms/${state.roomCode}`);
  onValue(roomRef, snap => {
    state.room = snap.val() || {};
    state.isHost = (state.room.hostId === state.userId);
    updateHostUI();

    const waiting = (!state.isHost && !state.room.maxPlayers);
    hostSelectingPop.classList.toggle('hidden', !waiting);

    syncSeatUI();
  });
}

function subscribeHands(){
  const handsRef = ref(db, `rooms/${state.roomCode}/hands`);
  onValue(handsRef, snap => {
    state.hands = snap.val() || {};
    ensureMyHandStageOrder();
    maybeAnnounceRevealPhase();
    renderHands();
  });
}

function subscribePlayedCards(){
  const playedRef = ref(db, `rooms/${state.roomCode}/playedCards`);
  onValue(playedRef, snap => {
    const nextPlayedCards = snap.val() || {};
    if (!hasPlayedCardsSnapshot){
      hasPlayedCardsSnapshot = true;
      state.playedCards = nextPlayedCards;
      lastPlayedCardKeys = new Set(Object.keys(nextPlayedCards));
      syncPlacedCardIdsFromPlayed();
      maybeAnnounceRevealPhase();
      maybeRunRevealFlipSequence();
      maybeAnnounceRevealResult();
      renderHands();
      return;
    }
    const addedEntries = Object.entries(nextPlayedCards)
      .filter(([key, card]) => !lastPlayedCardKeys.has(key) && card?.playerId && card.playerId !== state.userId)
      .map(([key, card]) => ({ key, ...card }));
    if (addedEntries.length){
      addedEntries.forEach((entry) => inFlightPlayedCardKeys.add(entry.key));
    }
    state.playedCards = nextPlayedCards;
    lastPlayedCardKeys = new Set(Object.keys(nextPlayedCards));
    syncPlacedCardIdsFromPlayed();
    maybeAnnounceRevealPhase();
    maybeRunRevealFlipSequence();
    maybeAnnounceRevealResult();
    renderHands();
    if (addedEntries.length){
      requestAnimationFrame(() => {
        animateRemotePlayedCards(addedEntries);
      });
    }
  });
}

function subscribePhaseEvents(){
  const phaseRef = ref(db, `rooms/${state.roomCode}/phaseEvent`);
  onValue(phaseRef, snap => {
    const evt = snap.val();
    if (!evt || !evt.label || !evt.ts) return;
    if (evt.ts <= lastShownPhaseEventTs) return;
    lastShownPhaseEventTs = evt.ts;
    if (evt.type && lastSeenPhaseTicks[evt.type] != null){
      lastSeenPhaseTicks[evt.type] = Math.max(lastSeenPhaseTicks[evt.type], evt.ts);
    }
    showPhaseFlow(evt.label);
  });

  const phaseStateRef = ref(db, `rooms/${state.roomCode}/phaseState`);
  onValue(phaseStateRef, snap => {
    const data = snap.val() || {};
    state.phaseState = data;
    state.currentPhase = deriveCurrentPhase(data);
    const mapping = [
      { key: 'discussionTick', phase: 'discussion', label: '議論フェーズ' },
      { key: 'placementTick', phase: 'placement', label: '配置フェーズ' },
      { key: 'revealTick', phase: 'reveal', label: '公開フェーズ' }
    ];
    mapping.forEach(({ key, phase, label }) => {
      const tick = Number(data[key] || 0);
      if (!tick || tick <= (lastSeenPhaseTicks[phase] || 0)) return;
      lastSeenPhaseTicks[phase] = tick;
      showPhaseFlow(label);
    });
    maybeRunRevealFlipSequence();
    maybeAnnounceRevealResult();
    renderHands();
    syncGearClickableState();
  });
}

function subscribeSubgearCount(){
  const subgearCountRef = ref(db, `rooms/${state.roomCode}/subgearCount`);
  onValue(subgearCountRef, snap => {
    currentSubgearCount = Math.max(0, Math.min(3, Number(snap.val()) || 0));
    applySubgearCountToDom();
  });
}

function subscribeStage(){
  const stageRef = ref(db, `rooms/${state.roomCode}/stageCode`);
  onValue(stageRef, async snap => {
    const sharedStageRaw = snap.val();
    const sharedStage = STAGE_CODES.includes(sharedStageRaw) ? sharedStageRaw : '';

    if (sharedStage === currentStage){
      if (state.isHost){
        hostHandLockedByStage = !!currentStage;
        syncHostStageReadyButton();
        renderHands();
      }
      return;
    }

    currentStage = sharedStage;
    lastAutoSortedHandSignature = '';
    resetBoardAndNeedleRotations();
    if (currentStage) localStorage.setItem(STAGE_KEY, currentStage);
    else localStorage.removeItem(STAGE_KEY);
    if (state.isHost){
      hostHandLockedByStage = !!currentStage;
      syncHostStageReadyButton();
      renderHands();
    }
    if (!currentStage){
      revealPhaseAnnouncedForStage = '';
    }
    revealResultAnnouncedKey = '';
    revealFlipProcessingKey = '';
    if (revealFlipRetryTimer){
      clearTimeout(revealFlipRetryTimer);
      revealFlipRetryTimer = null;
    }
    if (roomTotalsRefreshTimer){
      clearTimeout(roomTotalsRefreshTimer);
      roomTotalsRefreshTimer = null;
    }
    if (revealResultDelayTimer){
      clearTimeout(revealResultDelayTimer);
      revealResultDelayTimer = null;

}

function subscribePlayers(){

  onValue(tablesRef, snap => {

function renderMyHand(){
  myHandEl.innerHTML = '';
  const myId = state.userId;
  const handData = state.hands[myId];
  if (!handData || !Array.isArray(handData.cards)) return;
  const shouldLockHand = state.isHost && hostHandLockedByStage && !!currentStage;
  const shouldHideInDiscussion = !state.isHost && !!currentStage
    && state.currentPhase !== 'placement'
    && state.currentPhase !== 'reveal';
  const canDragNow = canCurrentUserDragCard() && !shouldLockHand && !shouldHideInDiscussion;
  const shouldPulse = canDragNow && !activeDrag;

  const seatedPlayerIds = Object.values(state.tables || {})
    .filter((seat) => seat?.playerId)
    .map((seat) => seat.playerId);
  const isTwoPlayerMode = seatedPlayerIds.length === 2;
  const totalPlacedCount = Object.values(state.playedCards || {})
    .filter((card) => card?.playerId && seatedPlayerIds.includes(card.playerId))
    .length;
  const myPlacedCount = Object.values(state.playedCards || {})
    .filter((card) => card?.playerId === myId)
    .length;

  let leftmostPlayableFound = false;
  const candidateCards = [];
  handData.cards.forEach((cardData) => {
    const cardId = makeCardId(myId, cardData);
    if (placedCardIds.has(cardId) || pendingPlacedCardIds.has(cardId)) return;
    candidateCards.push({ cardData, cardId });
  });

  const reserveCandidateIds = candidateCards.slice(-2).map((entry) => entry.cardId);
  const keepReservedHidden = isTwoPlayerMode
    && reserveCandidateIds.length === 2
    && (myPlacedCount < 2 || totalPlacedCount < 4);
  const cardsToRender = keepReservedHidden ? candidateCards.slice(0, -2) : candidateCards;
  const slideInCardIds = !keepReservedHidden && twoPlayerReservedCardIds.length
    ? new Set(twoPlayerReservedCardIds)
    : null;
  if (keepReservedHidden){
    twoPlayerReservedCardIds = reserveCandidateIds;
  } else if (!isTwoPlayerMode){
    twoPlayerReservedCardIds = [];
  } else if (twoPlayerReservedCardIds.length){
    twoPlayerReservedCardIds = [];
  }

  cardsToRender.forEach(({ cardData, cardId }) => {
    const isLeftmostPlayable = !leftmostPlayableFound;
    leftmostPlayableFound = true;
    const canPlayThisCard = !isLeftmostOnlyStage(currentStage) || isLeftmostPlayable;

    const card = document.createElement('div');
    card.className = 'my-card';
    card.dataset.cardId = cardId;

    if (shouldPulse){
      card.classList.add('turn-pulse');
    }
    if (slideInCardIds?.has(cardId)){
      card.classList.add('reserve-slide-in');
    }

    if (shouldLockHand || shouldHideInDiscussion){
      card.textContent = '';
      card.style.background = cardData.color === 'black'
        ? getBlackBackGradient()
        : 'repeating-linear-gradient(135deg,#ffffff 0px,#ffffff 4px,#e5e7eb 4px,#e5e7eb 8px)';
      card.style.border = cardData.color === 'black' ? '1px solid #58606f' : '1px solid #cfcfcf';
      card.style.cursor = shouldLockHand ? 'not-allowed' : 'default';
    } else {
      const num = cardData.num;
      const color = cardData.color;
      setCardNumberDom(card, num);
      card.style.background = color === 'black' ? '#0b1530' : '#fff';
      card.style.color = color === 'black' ? '#fff' : '#111';
      card.style.border = color === 'black' ? '1px solid #0b1530' : '1px solid #ddd';
      if (canDragNow && canPlayThisCard){
        card.addEventListener('pointerdown', (ev) => startCardDrag(ev, { ...cardData, id: cardId }));
      } else {
        card.style.cursor = canDragNow ? 'not-allowed' : 'default';
      }
    }

    myHandEl.appendChild(card);
  });
}

function cleanupDroppedCards(){
  const myCards = state.hands[state.userId]?.cards || [];
  const validIds = new Set(myCards.map((card) => makeCardId(state.userId, card)));

  [...placedCardIds].forEach((id) => {
    if (!validIds.has(id)) placedCardIds.delete(id);
  });
  [...pendingPlacedCardIds].forEach((id) => {
    if (!validIds.has(id)) pendingPlacedCardIds.delete(id);
  });
}

function syncPlacedCardIdsFromPlayed(){
  placedCardIds.clear();
  Object.values(state.playedCards || {}).forEach((card) => {
    if (card?.playerId === state.userId && card?.id){
      placedCardIds.add(card.id);
    }
  });
}

function maybeAnnounceRevealPhase(){
  if (!state.isHost || !state.roomCode || !currentStage) return;
  const tables = state.tables || {};
  const seatedPlayerIds = Object.values(tables)
    .filter((seat) => seat?.playerId)
    .map((seat) => seat.playerId);
  if (!seatedPlayerIds.length) return;

  const remainingCards = seatedPlayerIds.reduce((sum, pid) => {
    const cards = state.hands[pid]?.cards;
    return sum + (Array.isArray(cards) ? cards.length : 0);
  }, 0);
  const placedCount = Object.values(state.playedCards || {})
    .filter((card) => card?.playerId && seatedPlayerIds.includes(card.playerId))
    .length;
  const totalExpectedCards = remainingCards + placedCount;
  if (!totalExpectedCards) return;

  if (placedCount >= totalExpectedCards){
    const key = `${state.roomCode}:${currentStage}`;
    if (revealPhaseAnnouncedForStage === key) return;
    revealPhaseAnnouncedForStage = key;
    emitPhaseEvent('reveal');
  }
}

function getPlayedEntriesSorted(){
  return Object.entries(state.playedCards || {})
    .map(([key, card]) => ({ key, ...card }))
    .filter((card) => card && card.room)
    .sort((a, b) => Number(a.placedAt || 0) - Number(b.placedAt || 0));
}

function getRoomCardsMap(entries = getPlayedEntriesSorted()){
  const map = new Map(Array.from({ length: 6 }, (_, i) => [i + 1, []]));
  entries.forEach((card) => {
    const room = Number(card.room);
    if (!map.has(room)) return;
    map.get(room).push(card);
  });
  return map;
}

function getRoomResultValue(stage, cards = []){
  if (typeof stage === 'string' && stage.startsWith('6-')){
    if (!cards.length) return 0;
    const nums = cards.map((card) => Number(card.num || 0));
    const maxNum = Math.max(...nums);
    const minNum = Math.min(...nums);
    return maxNum - minNum;
  }
  return cards.reduce((acc, card) => acc + Number(card.num || 0), 0);
}

function getPlusMinusColorForRoom(stage, room){
  const placementRule = getRoomPlacementRule(stage, Number(room));
  if (
    placementRule
    && Array.isArray(placementRule.allowedColors)
    && placementRule.allowedColors.length === 1
  ){
    const onlyColor = placementRule.allowedColors[0];
    if (onlyColor === 'white' || onlyColor === 'black'){
      return onlyColor;
    }
  }
  return null;
}

function evaluatePlusMinusSuccess(stage, entries, roomCardsMap){
  const stagePlusMinus = STAGE_PLUS_MINUS[stage];
  if (!stagePlusMinus) return true;

  const groupedRequirements = new Map();
  Object.entries(stagePlusMinus).forEach(([roomKey, sign]) => {
    if (sign !== '+' && sign !== '-') return;
    const room = Number(roomKey);
    if (!(room >= 1 && room <= 6)) return;
    const color = getPlusMinusColorForRoom(stage, room);
    const groupKey = `${sign}:${color || 'any'}`;
    if (!groupedRequirements.has(groupKey)){
      groupedRequirements.set(groupKey, { sign, color, rooms: [] });
    }
    groupedRequirements.get(groupKey).rooms.push(room);
  });

  for (const group of groupedRequirements.values()){
    const domainCards = entries.filter((card) => {
      if (group.color && String(card.color || 'white') !== group.color) return false;
      return true;
    });
    const requiredCount = group.rooms.length;
    if (domainCards.length < requiredCount) return false;

    const sortedNums = domainCards
      .map((card) => Number(card.num || 0))
      .sort((a, b) => a - b);
    const threshold = group.sign === '-'
      ? sortedNums[requiredCount - 1]
      : sortedNums[sortedNums.length - requiredCount];

    for (const room of group.rooms){
      const roomCards = roomCardsMap.get(room) || [];
      const hasRequiredCard = roomCards.some((card) => {
        if (group.color && String(card.color || 'white') !== group.color) return false;
        const num = Number(card.num || 0);
        return group.sign === '-' ? num <= threshold : num >= threshold;
      });
      if (!hasRequiredCard) return false;
    }
  }

  return true;
}

function evaluatePlacementResult(stage, roomCardsMap){
  if (
    typeof stage === 'string'
    && (stage.startsWith('5-') || stage.startsWith('6-'))
  ){
    for (let room = 1; room <= 6; room++){
      const cards = roomCardsMap.get(room) || [];
      if (cards.length !== 2) return false;
    }
  }

  const roomSums = [];
  for (let room = 1; room <= 6; room++){
    const cards = roomCardsMap.get(room) || [];
    if (!cards.length) continue;
    const value = getRoomResultValue(stage, cards);
    roomSums.push({ room, sum: value });
  }

  let isAscending = true;
  for (let i = 1; i < roomSums.length; i++){
    if (roomSums[i].sum < roomSums[i - 1].sum){
      isAscending = false;
      break;
    }
  }

  let conditionsOk = true;
  const conditions = STAGE_ROOM_SUCCESS_CONDITIONS[stage] || [];
  conditions.forEach((cond) => {
    const cards = roomCardsMap.get(cond.room) || [];
    const value = getRoomResultValue(stage, cards);
    if (!cards.length || value < Number(cond.min) || value > Number(cond.max)){
      conditionsOk = false;
    }
  });

  const hasInfinity = stage === '1-1';
  const room6Sum = getRoomResultValue(stage, roomCardsMap.get(6) || []);
  const room6Ok = hasInfinity || room6Sum <= 24;
  const plusMinusOk = evaluatePlusMinusSuccess(stage, getPlayedEntriesSorted(), roomCardsMap);

  return isAscending && conditionsOk && room6Ok && plusMinusOk;
}

async function maybeRunRevealFlipSequence(){
  if (!state.isHost || !state.roomCode || !currentStage) return;
  if (state.currentPhase !== 'reveal') return;
  const revealTick = Number(state.phaseState?.revealTick || 0);
  if (!revealTick) return;
  const phaseKey = `${state.roomCode}:${currentStage}:${revealTick}`;
  if (revealFlipProcessingKey === phaseKey) return;

  const entries = getPlayedEntriesSorted();
  const hasBackCards = entries.some((card) => card.face === 'back');
  if (!hasBackCards) return;

  revealFlipProcessingKey = phaseKey;
  try{
    for (let pass = 0; pass < 6; pass++){
      const latestEntries = getPlayedEntriesSorted();
      const latestBackCards = latestEntries.filter((card) => card.face === 'back');
      if (!latestBackCards.length) break;

      for (let room = 1; room <= 6; room++){
        const roomBackCards = latestBackCards.filter((card) => Number(card.room) === room);
        if (!roomBackCards.length) continue;
        for (const card of roomBackCards){
          await update(ref(db, `rooms/${state.roomCode}/playedCards/${card.key}`), {
            face: 'face',
            revealedAt: Date.now()
          });
        }
        await sleep(REVEAL_ROOM_INTERVAL_MS);
      }
    }
  } finally {
    revealFlipProcessingKey = '';
    const remainingBackCards = getPlayedEntriesSorted().some((card) => card.face === 'back');
    if (remainingBackCards && state.currentPhase === 'reveal'){
      scheduleRevealFlipRetry(180);
    }
  }
}

function maybeAnnounceRevealResult(){
  if (!state.roomCode || !currentStage) return;
  if (state.currentPhase !== 'reveal') return;
  const revealTick = Number(state.phaseState?.revealTick || 0);
  if (!revealTick) return;
  const phaseKey = `${state.roomCode}:${currentStage}:${revealTick}`;
  if (revealResultAnnouncedKey === phaseKey) return;

  const entries = getPlayedEntriesSorted();
  if (!entries.length) return;
  const allFaceUp = entries.every((card) => card.face !== 'back');
  if (!allFaceUp) return;

  const roomCardsMap = getRoomCardsMap(entries);
  const room6Cards = roomCardsMap.get(6) || [];
  const revealTickTs = Number(state.phaseState?.revealTick || 0);
  if (room6Cards.length){
    const latestRoom6RevealTs = room6Cards.reduce((latestTs, card) => {
      const ts = Number(card.revealedAt || 0);
      return ts > latestTs ? ts : latestTs;
    }, 0);
    const room6TotalShownAt = Math.max(revealTickTs, latestRoom6RevealTs) + ROOM_TOTAL_DISPLAY_DELAY_MS;
    const resultPopAt = room6TotalShownAt + RESULT_POP_DELAY_AFTER_ROOM6_TOTAL_MS;
    const waitMs = resultPopAt - Date.now();
    if (waitMs > 0){
      scheduleRevealResultRetry(waitMs);
      return;
    }
  }

  const success = evaluatePlacementResult(currentStage, roomCardsMap);
  showPhaseFlow(success ? '配置成功' : '配置失敗');
  revealResultAnnouncedKey = phaseKey;
}

function svgToClientPoint(x, y){
  const pt = stageSvg.createSVGPoint();
  pt.x = x;
  pt.y = y;
  return pt.matrixTransform(stageSvg.getScreenCTM());
}

function getGuideMetrics(){
  const csGuide = getComputedStyle(stageSvg);
  const centerR = parseFloat(csGuide.getPropertyValue('--roomGuideCenterR')) || ((innerR + outerR) / 2);
  const guideR = parseFloat(csGuide.getPropertyValue('--roomGuideR')) || Math.max(8, (outerR - innerR) / 2 - 2);
  const outerOffset = parseFloat(csGuide.getPropertyValue('--roomGuideOuterOffset')) || 8;
  const ctm = stageSvg.getScreenCTM();
  const scale = ctm ? Math.hypot(ctm.a, ctm.b) : 1;
  return { centerR, guideR, outerOffset, scaledGuideR: guideR * scale };
}

function getRoomPlacementRule(stage, room){
  const browncardsCount = getBrowncardsCountForMission(stage, room);
  if (browncardsCount > 0){
    return { maxTotal: browncardsCount };
  }

  if (stage === '1-1'){
    if (room === 1) return { maxTotal: 1, allowedColors: ['white'], perColorMax: { white: 1 } };
    if (room === 6) return { maxTotal: 3 };
  }
  if (stage === '1-2'){
    if (room === 4) return { maxTotal: 3 };
  }
  if (stage === '1-4'){
    if (room === 4) return { maxTotal: 2, allowedColors: ['white', 'black'], perColorMax: { white: 1, black: 1 } };
  }
  if (stage === '2-1'){
    if ([1, 2, 3].includes(room)) return { disallowedNums: ['1', '2', '3'] };
  }
  if (stage === '2-2'){
    if ([3, 4].includes(room)) return { disallowedNums: ['7', '8', '9'] };
  }
  if (stage === '2-3'){
    if (room === 1) return { disallowedNums: ['1', '2', '3'] };
    if (room === 3) return { disallowedNums: ['4', '5', '6'] };
    if (room === 4) return { disallowedNums: ['7', '8', '9'] };
    if (room === 6) return { disallowedNums: ['10', '11', '12'] };
  }
  if (stage === '4-3'){
    if ([1, 3, 5].includes(room)) return { disallowedNums: ['1', '2', '3'] };
  }
  if (stage === '5-4'){
    if ([3, 4].includes(room)){
      return { maxTotal: 2, allowedColors: ['white', 'black'], perColorMax: { white: 1, black: 1 } };
    }
  }
  if (stage === '6-2'){
    if (room === 1) return { maxTotal: 2, disallowedNums: ['1', '2', '3'] };
    if (room === 2) return { maxTotal: 2, allowedColors: ['white', 'black'], perColorMax: { white: 1, black: 1 } };
  }
  if (stage === '6-4'){
    if (room === 1) return { maxTotal: 2, allowedColors: ['white'], perColorMax: { white: 2 } };
    if (room === 4) return { maxTotal: 2, allowedColors: ['black'], perColorMax: { black: 2 } };
  }
  if (typeof stage === 'string' && stage.startsWith('5-')){
    return { maxTotal: 2 };
  }
  if (typeof stage === 'string' && stage.startsWith('6-')){
    return { maxTotal: 2 };
  }
  return null;
}

function isWhiteOnlyRoom(stage, room){
  const rule = getRoomPlacementRule(stage, Number(room));
  if (!rule || !Array.isArray(rule.allowedColors)) return false;
  return rule.allowedColors.length === 1 && rule.allowedColors[0] === 'white';
}

function getRoomPlacementCounts(room){
  const playedEntries = Object.values(state.playedCards || {});
  let total = 0;
  const perColor = { white: 0, black: 0 };
  for (const card of playedEntries){
    if (!card || Number(card.room) !== Number(room)) continue;
    total += 1;
    const color = String(card.color || 'white');
    if (color === 'black') perColor.black += 1;
    else perColor.white += 1;
  }
  return { total, perColor };
}

function canPlaceCardInRoom(cardData, room, stage = currentStage){
  if (!cardData || !(room >= 1 && room <= 6)) return false;
  const forcedClockRooms = getForcedClockRoomsForNextPlacement(stage);
  if (forcedClockRooms.size > 0 && !forcedClockRooms.has(Number(room))) return false;

  const rule = getRoomPlacementRule(stage, Number(room));
  if (!rule) return true;

  const color = String(cardData.color || 'white');
  if (Array.isArray(rule.allowedColors) && !rule.allowedColors.includes(color)) return false;
  if (Array.isArray(rule.disallowedNums)){
    const num = String(cardData.num ?? '').trim();
    const normalizedNum = num
      .replace(/[０-９]/g, (ch) => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0))
      .toLowerCase();
    const blocked = rule.disallowedNums.map((value) =>
      String(value)
        .replace(/[０-９]/g, (ch) => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0))
        .toLowerCase()
    );
    if (blocked.includes(normalizedNum)) return false;
  }

  const counts = getRoomPlacementCounts(room);
  if (typeof rule.maxTotal === 'number' && counts.total >= rule.maxTotal) return false;
  if (rule.perColorMax && typeof rule.perColorMax[color] === 'number' && (counts.perColor[color] || 0) >= rule.perColorMax[color]){
    return false;
  }
  return true;
}

function findDropRoom(clientX, clientY, cardData = activeDrag?.cardData){
  const { centerR, guideR } = getGuideMetrics();
  const { x: centerX, y: centerY, rect } = getBoardCenterClient();
  const scale = rect.width / 300;
  const distance = Math.hypot(clientX - centerX, clientY - centerY);
  const radialGap = Math.abs(distance - (centerR * scale));
  if (radialGap > (guideR * scale)) return null;

  const pointerDeg = pointerAngleDegFromBoardCenter(clientX, clientY);
  for(let room = 1; room <= 6; room++){
    const midDeg = normalizeDeg((room - 1) * 60 + 30 + boardRotationDeg);
    const delta = Math.abs(shortestDegDelta(pointerDeg, midDeg));
    if (delta <= 30){
      if (!cardData || canPlaceCardInRoom(cardData, room)) return room;
      return null;
    }
  }
  return null;
}

async function placeDroppedCard(cardData, room, face = 'face'){
  if (!state.roomCode) return;
  const placedAt = Date.now();
  const key = `${state.userId}_${cardData.id}_${placedAt}`;
  const localCard = {
    id: cardData.id,
    num: cardData.num,
    color: cardData.color,
    face,
    room,
    playerId: state.userId,
    placedAt,
    boardRotationAtPlacement: boardRotationDeg
  };
  pendingPlacedCardIds.delete(cardData.id);
  placedCardIds.add(cardData.id);
  state.playedCards = {
    ...(state.playedCards || {}),
    [key]: localCard
  };
  lastPlayedCardKeys.add(key);
  renderHands();
  try {
    await Promise.all([
      set(ref(db, `rooms/${state.roomCode}/playedCards/${key}`), localCard),
      removeCardFromHandInDb(state.userId, cardData)
    ]);
  } catch (err){
    delete state.playedCards[key];
    lastPlayedCardKeys.delete(key);
    placedCardIds.delete(cardData.id);
    pendingPlacedCardIds.delete(cardData.id);
    renderHands();
    throw err;
  }
}

async function removeCardFromHandInDb(playerId, cardData){
  const cardsRef = ref(db, `rooms/${state.roomCode}/hands/${playerId}/cards`);
  await runTransaction(cardsRef, (cards) => {
    if (!Array.isArray(cards) || !cards.length) return cards;
    let removeIndex = -1;
    if (cardData?.uid){
      removeIndex = cards.findIndex((c) => c && c.uid === cardData.uid);
    }
    if (removeIndex === -1){
      removeIndex = cards.findIndex((c) => c && c.num === cardData.num && c.color === cardData.color);
    }
    if (removeIndex === -1) return cards;
    const next = cards.slice();
    next.splice(removeIndex, 1);
    return next;
  });
}

function makeCardId(playerId, cardData){
  if (cardData?.uid) return `${playerId}-${cardData.uid}`;
  const num = Number(cardData?.num || 0);

  return `${playerId}-${color}-${num}`;
}

function isUnderlineTargetNumber(num){
  const parsed = Number(num);
  return parsed === 6 || parsed === 9;

function setCardNumberDom(el, num){
  if (!(el instanceof HTMLElement)) return;
  el.textContent = '';

  el.appendChild(span);
}

function getStageSortOrder(stage = currentStage){
  if (stage === '4-1') return 'desc';
  if (stage === '4-2') return 'asc';
  return '';
}

function sortCardsByNum(cards = [], order = 'asc'){
  return cards.slice().sort((a, b) => {
    const an = Number(a?.num || 0);
    const bn = Number(b?.num || 0);
    if (an !== bn) return order === 'desc' ? (bn - an) : (an - bn);
    const ac = String(a?.color || 'white');
    const bc = String(b?.color || 'white');
    if (ac === bc) return 0;
    return ac === 'white' ? -1 : 1;
  });
}

function getCardsSignature(cards = []){
  return cards.map((card, idx) => {
    if (!card) return `${idx}:null`;
    const uid = card.uid ? `uid:${card.uid}` : '';
    return `${idx}:${uid}|${String(card.color || 'white')}|${Number(card.num || 0)}`;
  }).join('||');
}

function ensureMyHandStageOrder(){
  const order = getStageSortOrder(currentStage);
  if (!order || !state.roomCode || !state.userId) return;
  const cards = state.hands?.[state.userId]?.cards;
  if (!Array.isArray(cards) || cards.length <= 1) return;

  const sorted = sortCardsByNum(cards, order);
  const currentSig = getCardsSignature(cards);
  const sortedSig = getCardsSignature(sorted);
  if (currentSig === sortedSig || lastAutoSortedHandSignature === currentSig) return;
  lastAutoSortedHandSignature = currentSig;

  const cardsRef = ref(db, `rooms/${state.roomCode}/hands/${state.userId}/cards`);
  runTransaction(cardsRef, (dbCards) => {
    if (!Array.isArray(dbCards) || dbCards.length <= 1) return dbCards;
    const next = sortCardsByNum(dbCards, order);
    return getCardsSignature(dbCards) === getCardsSignature(next) ? dbCards : next;
  }).catch((err) => {
    console.error('手札の自動並び替えに失敗しました', err);
  });
}

function sortMyHandByNum(order = 'asc'){
  if (!state.roomCode || !state.userId) return;
  const cardsRef = ref(db, `rooms/${state.roomCode}/hands/${state.userId}/cards`);
  runTransaction(cardsRef, (cards) => {
    if (!Array.isArray(cards) || cards.length <= 1) return cards;
    return sortCardsByNum(cards, order);
  }).catch((err) => {
    console.error('手札の並び替えに失敗しました', err);
  });
}

function startCardDrag(ev, cardData){
  ev.preventDefault();
  if (activeDrag) return;
  if (!canCurrentUserDragCard()) return;
  if (state.isHost && hostHandLockedByStage && currentStage) return;
  const srcEl = ev.currentTarget;
  if (!(srcEl instanceof HTMLElement)) return;
  const srcRect = srcEl.getBoundingClientRect();

  srcEl.setPointerCapture(ev.pointerId);
  srcEl.classList.add('dragging');
  srcEl.style.visibility = 'hidden';

  const ghost = srcEl.cloneNode(true);
  ghost.classList.remove('dragging');
  ghost.classList.remove('turn-pulse');
  ghost.style.visibility = 'visible';
  ghost.style.position = 'fixed';
  ghost.style.left = '0';
  ghost.style.top = '0';
  ghost.style.margin = '0';
  ghost.style.width = `${srcRect.width}px`;
  ghost.style.height = `${srcRect.height}px`;
  ghost.style.zIndex = '500';
  ghost.style.pointerEvents = 'none';
  ghost.style.opacity = '0.9';
  ghost.style.animation = 'none';
  ghost.style.transition = 'none';
  document.body.appendChild(ghost);

  activeDrag = { pointerId: ev.pointerId, srcEl, ghost, cardData };
  syncMyHandPulseDom();
  dragHoverRoom = findDropRoom(ev.clientX, ev.clientY);
  renderRoomGuideCircles();

  const ghostHalfW = srcRect.width / 2;
  const ghostHalfH = srcRect.height / 2;
  const move = (x, y) => {
    ghost.style.transform = `translate(${x - ghostHalfW}px, ${y - ghostHalfH}px)`;
  };
  move(ev.clientX, ev.clientY);

  const onMove = (mv) => {
    if (!activeDrag || mv.pointerId !== activeDrag.pointerId) return;
    move(mv.clientX, mv.clientY);
    const nextHoverRoom = findDropRoom(mv.clientX, mv.clientY);
    if (nextHoverRoom !== dragHoverRoom){
      dragHoverRoom = nextHoverRoom;
      renderRoomGuideCircles();
    }
  };
  const onUp = async (up) => {
    if (!activeDrag || up.pointerId !== activeDrag.pointerId) return;
    const dropRoom = findDropRoom(up.clientX, up.clientY);
    const droppedCardData = activeDrag.cardData;
    activeDrag.srcEl.classList.remove('dragging');
    activeDrag.srcEl.style.visibility = '';
    activeDrag.ghost.remove();
    activeDrag = null;
    syncMyHandPulseDom();
    dragHoverRoom = null;
    renderRoomGuideCircles();
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
    window.removeEventListener('pointercancel', onUp);
    if (dropRoom){
      if (placingCardIds.has(droppedCardData.id)) return;
      placingCardIds.add(droppedCardData.id);
      pendingPlacedCardIds.add(droppedCardData.id);
      renderHands();
      try {
        const choice = await openCardChoice(droppedCardData);
        await placeDroppedCard(droppedCardData, dropRoom, choice);
      } catch (err){
        console.error('カード配置に失敗しました', err);
      } finally {
        placingCardIds.delete(droppedCardData.id);
      }
    }
  };
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);
  window.addEventListener('pointercancel', onUp);
}

function updateMyHandPosition(){
  if(!myHandWrapperEl) return;

  const tableCenter = document.querySelector('.table-center');
  const meTag = playerCircle.querySelector('.player-tag.me');
  if(!tableCenter || !meTag){
    myHandEl.style.setProperty('--hand-offset-y', '0px');
    return;
  }

  const tableRect = tableCenter.getBoundingClientRect();
  const meRect = meTag.getBoundingClientRect();
  const meOnlyOffset = meTag.classList.contains('me') ? MY_TAG_ONLY_OFFSET_PX : 0;
  const requiredMarginTop = Math.max(46, (meRect.bottom - tableRect.bottom) + 46 - meOnlyOffset);
  const offsetY = Math.max(0, requiredMarginTop - 46);
  myHandEl.style.setProperty('--hand-offset-y', `${Math.round(offsetY)}px`);
}

function renderPlayerCircle(players){
  playerCircle.innerHTML = '';
  if (!players.length){
    updateMyHandPosition();
    return;
  }
  const activeTurnPlayers = new Set(getActiveTurnPlayerIds());

  const n = players.length;
  const radius = 70;
  const step = (2 * Math.PI) / n;
  const anchorAngle = Math.PI / 2;
  const meIndex = players.findIndex(p => p.id === state.userId);
  const SIDE_SLOT_LEFT_X = 2;
  const SIDE_SLOT_RIGHT_X = 98;
  const SIDE_SLOT_Y = 50;
  const FIXED_LAYOUTS = {
    3: {
      1: { x: SIDE_SLOT_LEFT_X, y: SIDE_SLOT_Y },
      2: { x: SIDE_SLOT_RIGHT_X, y: SIDE_SLOT_Y }
    },
    4: {
      1: { x: SIDE_SLOT_LEFT_X, y: SIDE_SLOT_Y },
      2: { x: 50, y: -20 },
      3: { x: SIDE_SLOT_RIGHT_X, y: SIDE_SLOT_Y }
    }
  };

  players.forEach((p, idx) => {
    const k = (meIndex === -1) ? idx : (idx - meIndex + n) % n;
    const isMe = p.id === state.userId;
    const fixedLayout = FIXED_LAYOUTS[n];
    const fixedSlot = fixedLayout ? fixedLayout[k] : null;
    const angle = anchorAngle + step * k;

    let x = fixedSlot ? fixedSlot.x : 50 + radius * Math.cos(angle);
    let y = fixedSlot ? fixedSlot.y : 50 + radius * Math.sin(angle);

    x = Math.max(-8, Math.min(108, x));

    let centerNudgePx = 0;
    const isSidePlayer = !!fixedSlot && (k === 1 || k === n - 1);
    if (isSidePlayer) {
      if (x < 50) centerNudgePx = 3;
      if (x > 50) centerNudgePx = -3;
    }

    const isBottomSlot = k === 0;
    const isTopSlot = (n % 2 === 0) && (k === n / 2);
    const isLeftOrRightSlot = (n >= 3) && (k === 1 || k === n - 1);
    let verticalOffsetPx = 0;
    if (isBottomSlot) verticalOffsetPx += 50;
    if (isTopSlot) verticalOffsetPx += 40;
    if (isLeftOrRightSlot) verticalOffsetPx -= 40;
    const bottomSlotCompensationPx = isBottomSlot ? MY_TAG_ONLY_OFFSET_PX : 0;

    const tag = document.createElement('div');
    tag.className = 'player-tag' + (isMe ? ' me' : '');
    tag.dataset.playerId = p.id;
    tag.textContent = p.name;
    tag.style.left = centerNudgePx === 0
      ? `${x}%`
      : `calc(${x}% ${centerNudgePx > 0 ? '+' : '-'} ${Math.abs(centerNudgePx)}px)`;
    tag.style.top = `calc(${y}% - 78px + ${verticalOffsetPx + bottomSlotCompensationPx}px)`;

    tag.onclick = () => {
      if (p.id === state.userId) return;
      if (!state.roomCode) return;
      if (state.seatedTable !== null) return;

      pendingSeatIndexToSteal = p.seatIndex;
      pendingSeatPlayerIdToSteal = p.id;
      kickMessage.textContent = `「${p.name}」を追い出して、この席に着席しますか？`;
      kickDialog.classList.remove('hidden');
    };

    const handData = state.hands[p.id];
    if (p.id !== state.userId && handData && Array.isArray(handData.cards) && handData.cards.length){
      const miniHand = document.createElement('div');
      miniHand.className = 'mini-hand';
      if (activeTurnPlayers.has(p.id)){
        miniHand.classList.add('turn-pulse');
      }

      const count = handData.cards.length;
      const spread = 70;
      const base = (count > 1) ? (-spread/2) : 0;

      handData.cards.forEach((cardData, idx2) => {
        const card = document.createElement('div');
        card.className = 'mini-card';

        const angleDeg = (count > 1) ? base + (spread/(count-1))*idx2 : 0;
        card.style.transform = `translate(-50%,0) rotate(${angleDeg}deg)`;
        card.style.zIndex = String(10 + idx2);

        const color = cardData?.color || 'white';
        card.classList.add(color === 'black' ? 'back-black' : 'back-white');

        miniHand.appendChild(card);
      });

      tag.appendChild(miniHand);
    }

    playerCircle.appendChild(tag);
  });

  updateMyHandPosition();
}

function mergePlayerHands(baseHand, inheritedHand){
  const baseCards = Array.isArray(baseHand?.cards) ? baseHand.cards : [];
  const inheritedCards = Array.isArray(inheritedHand?.cards) ? inheritedHand.cards : [];

  const seen = new Set();
  const merged = [];
  [...baseCards, ...inheritedCards].forEach((card) => {
    if (!card) return;
    const uidKey = card.uid ? `uid:${card.uid}` : '';
    const fallbackKey = `${card.color || 'white'}-${Number(card.num || 0)}`;
    const key = uidKey || fallbackKey;
    if (seen.has(key)) return;
    seen.add(key);
    merged.push(card);
  });

  return {
    ...(inheritedHand || {}),
    ...(baseHand || {}),
    cards: merged
  };
}

async function inheritPlayerProgress(fromPlayerId, toPlayerId){
  if (!state.roomCode) return;
  if (!fromPlayerId || !toPlayerId) return;
  if (fromPlayerId === toPlayerId) return;

  const basePath = `rooms/${state.roomCode}`;
  const [handsSnap, playedSnap] = await Promise.all([
    get(ref(db, `${basePath}/hands`)),
    get(ref(db, `${basePath}/playedCards`))
  ]);
  const hands = handsSnap.val() || {};
  const playedCards = playedSnap.val() || {};
  const updates = {};
  let hasUpdate = false;

  const fromHand = hands[fromPlayerId];
  const toHand = hands[toPlayerId];
  if (fromHand || toHand){
    updates[`hands/${toPlayerId}`] = mergePlayerHands(toHand, fromHand);
    if (fromHand){
      updates[`hands/${fromPlayerId}`] = null;
    }
    hasUpdate = true;
  }

  Object.entries(playedCards).forEach(([key, card]) => {
    if (!card || card.playerId !== fromPlayerId) return;
    const nextCard = { ...card, playerId: toPlayerId };
    if (typeof nextCard.id === 'string' && nextCard.id.startsWith(`${fromPlayerId}-`)){
      nextCard.id = `${toPlayerId}-${nextCard.id.slice(fromPlayerId.length + 1)}`;
    }
    updates[`playedCards/${key}`] = nextCard;
    hasUpdate = true;
  });

  if (!hasUpdate) return;
  await update(ref(db, basePath), updates);
}

async function dealInitialHands(){
  if (!state.roomCode) return;

  const tables = state.tables || {};
  const seatedPlayers = Object.keys(tables)
    .sort((a, b) => Number(a) - Number(b))
    .map(seatIndex => tables[seatIndex])
    .filter(t => t && t.playerId);

  const playerCount = seatedPlayers.length;

  if (playerCount === 0){
    alert('着席している参加者がいません。');
    return;
  }

  if (12 % playerCount !== 0){
    alert(`参加者${playerCount}人には12枚を均等に配れません。2人・3人・4人・6人で開始してください。`);
    return;
  }

  const fullDeck = createDeck24();
  const shuffledDeck = shuffleArray(fullDeck);
  const selected12 = shuffledDeck.slice(0, 12);

  const cardsPerPlayer = 12 / playerCount;
  const hands = {};

  seatedPlayers.forEach((player, index) => {
    const start = index * cardsPerPlayer;
    const end = start + cardsPerPlayer;
    hands[player.playerId] = {
      cards: selected12.slice(start, end)
    };
  });

  await set(ref(db, `rooms/${state.roomCode}/hands`), hands);
}

function applyImageFit(imgEl, radius, scaleVar, offXVar, offYVar){

/* ================== 角度/座標ユーティリティ ================== */
function polar(r, deg){
  const rad = (deg - 90) * Math.PI/180;
  return { x: r * Math.cos(rad), y: r * Math.sin(rad) };
}
function sectorPath(rIn, rOut, a0, a1){
  const p1 = polar(rIn, a0), p2 = polar(rOut, a0);
  const p3 = polar(rOut, a1), p4 = polar(rIn, a1);
  const large = (a1 - a0) > 180 ? 1 : 0;
  return [
    `M ${p1.x},${p1.y}`,
    `L ${p2.x},${p2.y}`,
    `A ${rOut},${rOut} 0 ${large} 1 ${p3.x},${p3.y}`,
    `L ${p4.x},${p4.y}`,
    `A ${rIn},${rIn} 0 ${large} 0 ${p1.x},${p1.y}`,
    'Z'
  ].join(' ');
}
function clickAngleDeg(svgPoint, center){
  const dx = svgPoint.x - center.x;
  const dy = svgPoint.y - center.y;
  let ang = Math.atan2(dy, dx) * 180/Math.PI;
  ang = (ang + 90 + 360) % 360;
  return ang;
}

function normalizeDeg(deg){
  return ((deg % 360) + 360) % 360;
}

function shortestDegDelta(fromDeg, toDeg){
  return ((toDeg - fromDeg + 540) % 360) - 180;
}

function getBoardCenterClient(){
  const rect = stageSvg.getBoundingClientRect();
  return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2, rect };
}

function pointerAngleDegFromBoardCenter(clientX, clientY){
  const { x, y } = getBoardCenterClient();
  const dx = clientX - x;
  const dy = clientY - y;
  return normalizeDeg(Math.atan2(dy, dx) * 180 / Math.PI + 90);
}

function toShortestVisualRotation(currentVisualDeg, nextNormalizedDeg){
  const currentNormalizedDeg = normalizeDeg(currentVisualDeg);
  const delta = shortestDegDelta(currentNormalizedDeg, nextNormalizedDeg);
  return currentVisualDeg + delta;
}

function applyBoardRotation(deg, { animate = false, useShortestPath = false } = {}){
  const normalized = normalizeDeg(deg);
  boardRotationVisualDeg = useShortestPath
    ? toShortestVisualRotation(boardRotationVisualDeg, normalized)
    : deg;
  boardRotationDeg = normalizeDeg(boardRotationVisualDeg);
  const hasPlacedCards = Object.keys(state.playedCards || {}).length > 0;
  const shouldAnimate = animate && !hasPlacedCards;
  stageSvg.style.transition = shouldAnimate ? 'transform 220ms ease-out' : 'none';
  stageSvg.style.transformOrigin = '50% 50%';
  stageSvg.style.transform = `rotate(${boardRotationVisualDeg}deg)`;
  syncRoomHintTableOrientation();
}

function snapBoardRotationToNearestRoom(){
  const snapped = normalizeDeg(Math.round(boardRotationDeg / 60) * 60);
  applyBoardRotation(snapped, { animate: true, useShortestPath: true });
  window.setTimeout(() => {
    if (!boardRotationDrag) stageSvg.style.transition = 'none';
  }, 260);
  return snapped;
}

function publishBoardRotation(deg, { isFinal = false, force = false } = {}){
  if (!state.roomCode || !state.userId) return;
  const now = Date.now();
  if (!force && !isFinal && (now - lastBoardRotationPublishAt) < ROTATION_SYNC_INTERVAL_MS){
    return;
  }
  lastBoardRotationPublishAt = now;
  const payload = {
    deg: normalizeDeg(deg),
    ts: now,
    actorId: state.userId,
    isFinal: !!isFinal
  };
  set(ref(db, `rooms/${state.roomCode}/boardRotation`), payload)
    .catch((err) => console.error('盤面回転の同期に失敗しました', err));
}

function subscribeBoardRotation(){
  const boardRotationRef = ref(db, `rooms/${state.roomCode}/boardRotation`);
  onValue(boardRotationRef, (snap) => {
    const data = snap.val();
    if (!data || typeof data.deg !== 'number') return;

    const ts = Number(data.ts || 0);
    const actorId = String(data.actorId || '');
    const normalizedDeg = normalizeDeg(data.deg);

    if (!hasBoardRotationSnapshot){
      hasBoardRotationSnapshot = true;
      lastBoardRotationTs = ts;
      applyBoardRotation(normalizedDeg, { animate: false, useShortestPath: true });
      return;
    }
    if (ts && ts <= lastBoardRotationTs) return;
    lastBoardRotationTs = Math.max(lastBoardRotationTs, ts);
    if (actorId && actorId === state.userId) return;
    if (boardRotationDrag) return;
    const shouldAnimate = !!data.isFinal;
    applyBoardRotation(normalizedDeg, { animate: shouldAnimate, useShortestPath: true });
    window.setTimeout(() => {
      if (!boardRotationDrag) stageSvg.style.transition = 'none';
    }, shouldAnimate ? 260 : 20);
  });
}

function subscribeCenterNeedleRotation(){
  const needleRef = ref(db, `rooms/${state.roomCode}/centerNeedleRotation`);
  onValue(needleRef, (snap) => {
    const data = snap.val();
    if (!data || typeof data.deg !== 'number') return;

    const ts = Number(data.ts || 0);
    const actorId = String(data.actorId || '');
    const normalizedDeg = normalizeDeg(data.deg);

    if (!hasCenterNeedleSnapshot){
      hasCenterNeedleSnapshot = true;
      lastCenterNeedleTs = ts;
      applyCenterNeedleRotation(normalizedDeg, { animate: false, useShortestPath: true });
      return;
    }
    if (ts && ts <= lastCenterNeedleTs) return;
    lastCenterNeedleTs = Math.max(lastCenterNeedleTs, ts);
    if (actorId && actorId === state.userId) return;
    if (centerNeedleDrag) return;
    const shouldAnimate = !!data.isFinal;
    applyCenterNeedleRotation(normalizedDeg, { animate: shouldAnimate, useShortestPath: true });
    window.setTimeout(() => {
      if (!centerNeedleDrag){
        if (centerTopLineG) centerTopLineG.style.transition = 'none';
        if (centerTopDiamondG) centerTopDiamondG.style.transition = 'none';
      }
    }, shouldAnimate ? 260 : 20);
  });
}

(function setupRotationHandles(){
  const g = stageSvg.querySelector('#rotationHandles');
  if (!g) return;
  g.style.touchAction = 'none';
  let touchRotationId = null;

  const startBoardRotationDrag = ({ pointerId, handle, captureEl, clientX, clientY }) => {
    if (isCenterNeedleDragging) return;
    stageSvg.classList.add('rotating');
    lastBoardRotationPublishAt = 0;
    boardRotationDrag = {
      pointerId,
      handle,
      captureEl,
      currentRotationDeg: boardRotationDeg,
      lastPointerDeg: pointerAngleDegFromBoardCenter(clientX, clientY)
    };
    stageSvg.style.transition = 'none';
    publishBoardRotation(boardRotationDeg, { isFinal: false, force: true });
  };

  const updateBoardRotationDrag = (clientX, clientY) => {
    if (isCenterNeedleDragging) return;
    if (!boardRotationDrag) return;
    const nextAngle = pointerAngleDegFromBoardCenter(clientX, clientY);
    const delta = shortestDegDelta(boardRotationDrag.lastPointerDeg, nextAngle);
    boardRotationDrag.currentRotationDeg = normalizeDeg(boardRotationDrag.currentRotationDeg + delta);
    boardRotationDrag.lastPointerDeg = nextAngle;
    applyBoardRotation(boardRotationDrag.currentRotationDeg);
    publishBoardRotation(boardRotationDrag.currentRotationDeg);
  };

  const endBoardRotationDrag = ({ pointerId = null, shouldSnap = true } = {}) => {
    if (!boardRotationDrag) return;
    if (pointerId !== null && boardRotationDrag.pointerId !== pointerId) return;
    stageSvg.classList.remove('rotating');
    if (boardRotationDrag.captureEl && typeof boardRotationDrag.captureEl.releasePointerCapture === 'function' && pointerId !== null) {
      boardRotationDrag.captureEl.releasePointerCapture(pointerId);
    }
    boardRotationDrag = null;
    if (shouldSnap){
      const snapped = snapBoardRotationToNearestRoom();
      publishBoardRotation(snapped, { isFinal: true, force: true });
    }
  };

  const handleScale = 1.5;
  const handleRadius = 8 * handleScale;
  const handleHitRadius = 10 * handleScale;
  const handleCenterR = outerR - 6;
  for (let room = 1; room <= 6; room++){
    const midDeg = (room - 1) * 60 + 30;
    const p = polar(handleCenterR, midDeg);
    const hit = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    hit.setAttribute('class', 'rotation-handle-hit');
    hit.setAttribute('cx', String(p.x));
    hit.setAttribute('cy', String(p.y));
    hit.setAttribute('r', String(handleHitRadius));
    hit.dataset.room = String(room);
    g.appendChild(hit);

    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('class', 'rotation-handle');
    c.setAttribute('cx', String(p.x));
    c.setAttribute('cy', String(p.y));
    c.setAttribute('r', String(handleRadius));
    c.dataset.room = String(room);
    g.appendChild(c);
  }

  const onPointerMove = (ev) => {
    if (!boardRotationDrag || ev.pointerId !== boardRotationDrag.pointerId) return;
    ev.preventDefault();
    updateBoardRotationDrag(ev.clientX, ev.clientY);
  };
  const onPointerUp = (ev) => {
    if (!boardRotationDrag || ev.pointerId !== boardRotationDrag.pointerId) return;
    endBoardRotationDrag({ pointerId: ev.pointerId, shouldSnap: true });
    window.removeEventListener('pointermove', onPointerMove);
    window.removeEventListener('pointerup', onPointerUp);
    window.removeEventListener('pointercancel', onPointerUp);
  };

  g.addEventListener('pointerdown', (ev) => {
    if (isCenterNeedleDragging) return;
    if (boardRotationDrag) return;
    if (ev.pointerType === 'touch' && ev.isPrimary === false) return;
    const handle = ev.target.closest('.rotation-handle, .rotation-handle-hit');
    if (!handle) return;
    ev.preventDefault();
    ev.stopPropagation();
    const captureEl = ev.currentTarget;
    if (typeof captureEl.setPointerCapture === 'function') captureEl.setPointerCapture(ev.pointerId);
    startBoardRotationDrag({
      pointerId: ev.pointerId,
      handle,
      captureEl,
      clientX: ev.clientX,
      clientY: ev.clientY
    });
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);
    window.addEventListener('pointercancel', onPointerUp);
  });

  const onTouchMove = (ev) => {
    if (!boardRotationDrag || !boardRotationDrag.pointerId || !String(boardRotationDrag.pointerId).startsWith('touch-')) return;
    const touch = Array.from(ev.touches).find((t) => t.identifier === touchRotationId);
    if (!touch) return;
    ev.preventDefault();
    updateBoardRotationDrag(touch.clientX, touch.clientY);
  };

  const onTouchEnd = (ev) => {
    if (!boardRotationDrag || touchRotationId === null) return;
    const isEndingTouch = Array.from(ev.changedTouches).some((t) => t.identifier === touchRotationId);
    if (!isEndingTouch) return;
    ev.preventDefault();
    endBoardRotationDrag({ pointerId: `touch-${touchRotationId}`, shouldSnap: true });
    touchRotationId = null;
    window.removeEventListener('touchmove', onTouchMove);
    window.removeEventListener('touchend', onTouchEnd);
    window.removeEventListener('touchcancel', onTouchEnd);
  };

  g.addEventListener('touchstart', (ev) => {
    if (isCenterNeedleDragging) return;
    if (boardRotationDrag) return;
    const touch = ev.changedTouches[0];
    if (!touch) return;
    const startTarget = document.elementFromPoint(touch.clientX, touch.clientY);
    const handle = startTarget?.closest?.('.rotation-handle, .rotation-handle-hit');
    if (!handle) return;
    ev.preventDefault();
    ev.stopPropagation();
    touchRotationId = touch.identifier;
    startBoardRotationDrag({
      pointerId: `touch-${touch.identifier}`,
      handle,
      captureEl: null,
      clientX: touch.clientX,
      clientY: touch.clientY
    });
    window.addEventListener('touchmove', onTouchMove, { passive: false });
    window.addEventListener('touchend', onTouchEnd, { passive: false });
    window.addEventListener('touchcancel', onTouchEnd, { passive: false });
  }, { passive: false });
})();

(function setupCenterNeedleDrag(){
  if (!centerTopDiamondG) return;
  centerTopDiamondG.style.pointerEvents = 'auto';
  centerTopDiamondG.style.touchAction = 'none';

  const endNeedleDrag = ({ pointerId = null, shouldSnap = true } = {}) => {
    if (!centerNeedleDrag) return;
    if (pointerId !== null && centerNeedleDrag.pointerId !== pointerId) return;
    if (
      centerNeedleDrag.captureEl
      && typeof centerNeedleDrag.captureEl.releasePointerCapture === 'function'
      && pointerId !== null
    ){
      centerNeedleDrag.captureEl.releasePointerCapture(pointerId);
    }
    centerNeedleDrag = null;
    isCenterNeedleDragging = false;
    if (rotationHandlesG) rotationHandlesG.style.pointerEvents = '';
    if (shouldSnap){
      const snapped = normalizeDeg(Math.round(centerNeedleRotationDeg / CENTER_NEEDLE_SNAP_DEG) * CENTER_NEEDLE_SNAP_DEG);
      applyCenterNeedleRotation(snapped, { animate: true, useShortestPath: true });
      publishCenterNeedleRotation(snapped, { isFinal: true, force: true });
      window.setTimeout(() => {
        if (!centerNeedleDrag){
          if (centerTopLineG) centerTopLineG.style.transition = 'none';
          if (centerTopDiamondG) centerTopDiamondG.style.transition = 'none';
        }
      }, 260);
    }
  };

  const onPointerMove = (ev) => {
    if (!centerNeedleDrag || ev.pointerId !== centerNeedleDrag.pointerId) return;
    ev.preventDefault();
    const nextAngle = pointerAngleDegFromBoardCenter(ev.clientX, ev.clientY);
    const delta = shortestDegDelta(centerNeedleDrag.lastPointerDeg, nextAngle);
    centerNeedleDrag.currentRotationDeg = normalizeDeg(centerNeedleDrag.currentRotationDeg + delta);
    centerNeedleDrag.lastPointerDeg = nextAngle;
    applyCenterNeedleRotation(centerNeedleDrag.currentRotationDeg);
    publishCenterNeedleRotation(centerNeedleDrag.currentRotationDeg);
  };
  const onPointerUp = (ev) => {
    if (!centerNeedleDrag || ev.pointerId !== centerNeedleDrag.pointerId) return;
    endNeedleDrag({ pointerId: ev.pointerId, shouldSnap: true });
    window.removeEventListener('pointermove', onPointerMove);
    window.removeEventListener('pointerup', onPointerUp);
    window.removeEventListener('pointercancel', onPointerUp);
  };

  centerTopDiamondG.addEventListener('pointerdown', (ev) => {
    const handle = ev.target.closest('.center-needle-handle');
    if (!handle) return;
    ev.preventDefault();
    ev.stopPropagation();
    lastCenterNeedlePublishAt = 0;
    isCenterNeedleDragging = true;
    stageSvg.classList.remove('rotating');
    stageSvg.style.transition = 'none';
    if (rotationHandlesG) rotationHandlesG.style.pointerEvents = 'none';
    const captureEl = ev.currentTarget;
    if (typeof captureEl.setPointerCapture === 'function') captureEl.setPointerCapture(ev.pointerId);
    centerNeedleDrag = {
      pointerId: ev.pointerId,
      captureEl,
      currentRotationDeg: centerNeedleRotationDeg,
      lastPointerDeg: pointerAngleDegFromBoardCenter(ev.clientX, ev.clientY)
    };
    publishCenterNeedleRotation(centerNeedleRotationDeg, { isFinal: false, force: true });
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);
    window.addEventListener('pointercancel', onPointerUp);
  });
})();

function getClosecardLabelForMission(mission, room){
